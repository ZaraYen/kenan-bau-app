@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c0:#04111f;--c1:#081c2e;--c2:#0d2540;--c3:#132e4f;--c4:#1a3860;
  --border:#1e3f62;--border2:#2d5580;
  --text:#d8eaf8;--text2:#7aaac8;--text3:#3d6a8a;
  --brand:#2e8bc0;--brand2:#2478a8;--brand-soft:rgba(46,139,192,.13);
  --green:#7ec832;--green2:#6aaa28;--green-s:rgba(126,200,50,.13);
  --red:#ef4444;--red-s:rgba(239,68,68,.12);
  --amber:#f59e0b;--amber-s:rgba(245,158,11,.12);
  --blue:#2e8bc0;--blue-s:rgba(46,139,192,.13);
  --yellow:#fbbf24;
  --r:10px;--r2:7px;--r3:5px;
  --shadow:0 4px 24px rgba(0,0,0,.5);
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--c0);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
#root{height:100%;display:flex;flex-direction:column}
.topbar::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#2e8bc0,#6aaa28);}

/* ── TOPBAR ── */
.topbar{position:relative;background:linear-gradient(180deg,#0d2540 0%,#081c2e 100%);border-bottom:1px solid rgba(46,139,192,.25);border-top:2px solid transparent;background-clip:padding-box;height:54px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.t-logo{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:15px;font-weight:500;color:var(--brand);letter-spacing:-.3px;text-decoration:none}
.t-logo-icon{width:30px;height:30px;background:var(--brand);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden}
.t-right{display:flex;align-items:center;gap:10px}
.t-user{display:flex;align-items:center;gap:7px;padding:3px 9px;background:var(--c3);border-radius:20px;border:1px solid var(--border);cursor:pointer}
.t-avatar{width:24px;height:24px;border-radius:50%;background:var(--brand);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff}
.t-uname{font-size:12px;font-weight:500}
.t-urole{font-size:10px;color:var(--text2)}
.t-logout{background:none;border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:var(--r3);cursor:pointer;font-family:var(--font);font-size:12px;transition:all .2s}
.t-logout:hover{border-color:var(--red);color:var(--red)}
/* ── LANG SWITCHER ── */
.lang-sw{display:flex;background:var(--c3);border:1px solid var(--border);border-radius:20px;overflow:hidden;flex-shrink:0}
.lang-btn{padding:4px 11px;font-size:12px;font-weight:600;font-family:var(--mono);cursor:pointer;border:none;background:none;color:var(--text3);transition:all .15s;letter-spacing:.3px}
.lang-btn.act{background:var(--brand);color:#fff}
.login-lang{display:flex;justify-content:center;margin-bottom:20px}
.login-lang .lang-sw{border-radius:20px}

/* ── SIDEBAR + CONTENT ── */
.app-body{flex:1;display:flex;overflow:hidden}
.sidebar{width:56px;background:var(--c1);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;flex-shrink:0;overflow-y:auto;transition:width .25s}
.sidebar.expanded{width:200px}
.sidebar-toggle{width:34px;height:34px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:18px;border-radius:var(--r3);display:flex;align-items:center;justify-content:center;transition:color .2s;margin-bottom:6px;flex-shrink:0}
.sidebar-toggle:hover{color:var(--brand)}
.nav-btn{width:40px;height:40px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:18px;border-radius:var(--r3);display:flex;align-items:center;justify-content:center;position:relative;transition:all .2s;flex-shrink:0;font-family:var(--font)}
.sidebar.expanded .nav-btn{width:calc(100% - 16px);height:36px;justify-content:flex-start;padding:0 10px;gap:9px;font-size:16px}
.nav-btn .nav-label{display:none;font-size:12px;font-weight:500;white-space:nowrap}
.sidebar.expanded .nav-btn .nav-label{display:block}
.nav-btn:hover{background:var(--c3);color:var(--text)}
.nav-btn.active{background:linear-gradient(90deg,rgba(46,139,192,.18),rgba(106,170,40,.08));color:var(--brand);border-right:2px solid var(--brand)}
.nav-btn .nav-badge{position:absolute;top:4px;right:4px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--c1)}
.sidebar.expanded .nav-btn .nav-badge{top:8px;right:8px}
.nav-divider{width:30px;height:1px;background:var(--border);margin:4px 0;flex-shrink:0}
.sidebar.expanded .nav-divider{width:calc(100% - 16px)}
.sidebar-bottom{margin-top:auto;padding:8px 0}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--c0);scroll-behavior:smooth}
.page{display:none;padding:20px}
.page.active{display:block}

/* ── BOTTOM NAV (mobile) ── */
.bottom-nav{display:none;background:var(--c1);border-top:1px solid var(--border);flex-shrink:0}
.bnav-items{display:flex}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 4px;border:none;background:none;color:var(--text3);cursor:pointer;font-family:var(--font);font-size:9px;font-weight:500;position:relative;transition:color .2s}
.bnav-btn .bicon{font-size:20px;line-height:1}
.bnav-btn.active{color:var(--brand);font-weight:600}
.bnav-btn .bnav-badge{position:absolute;top:5px;right:calc(50% - 14px);width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--c1)}

@media(max-width:767px){
  .sidebar{display:none}
  .bottom-nav{display:block}
  .topbar .t-user .t-uname,.topbar .t-user .t-urole{display:none}
  .page{padding:14px}
}
@media(min-width:768px){
  .main{padding-left:0}
}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:var(--c0);display:flex;align-items:center;justify-content:center;padding:20px;z-index:999}
.login-card{width:100%;max-width:420px;background:var(--c2);border:1px solid var(--border);border-radius:16px;padding:36px 28px}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.login-brand-icon{width:56px;height:56px;background:transparent;border-radius:0;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:visible}
.login-brand h1{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--brand)}
.login-brand p{font-size:11px;color:var(--text2)}
.demo-grid{display:grid;grid-template-columns:1fr;gap:5px;margin-top:16px}
.demo-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--c3);border:1px solid var(--border);border-radius:var(--r3);cursor:pointer;transition:border-color .2s;font-size:12px}
.demo-row:hover{border-color:var(--brand)}
.demo-row-left{font-weight:500;color:var(--text)}
.demo-row-cred{color:var(--text2);font-family:var(--mono);font-size:11px}

/* ── TYPOGRAPHY ── */
.ph{margin-bottom:18px}
.ph h2{font-size:19px;font-weight:600;color:var(--text)}
.ph p{font-size:12px;color:var(--text2);margin-top:2px}
h3{font-size:15px;font-weight:600;color:var(--text)}

/* ── CARDS ── */
.card{background:var(--c2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;transition:border-color .2s}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:14px;font-weight:600}
.card-sub{font-size:11px;color:var(--text2);margin-top:2px}

/* ── FORM ── */
.fg{margin-bottom:13px}
.fg label,.flabel{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.fc{width:100%;padding:9px 13px;background:var(--c3);border:1px solid var(--border);border-radius:var(--r3);color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.fc:focus{border-color:var(--brand)}
.fc::placeholder{color:var(--text3)}
textarea.fc{resize:vertical;min-height:80px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
@media(max-width:400px){.fr,.fr3{grid-template-columns:1fr}}

/* ── BUTTONS ── */
.btn{padding:9px 16px;border-radius:var(--r3);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,#2e8bc0,#2478a8);color:#fff;box-shadow:0 2px 8px rgba(46,139,192,.25)}
.btn-primary:hover{background:var(--brand2)}
.btn-ghost{background:none;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-danger{background:var(--red-s);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.btn-success{background:var(--green-s);color:var(--green);border:1px solid rgba(126,200,50,.25)}
.btn-warning{background:var(--amber-s);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-block{width:100%;justify-content:center;padding:11px;font-size:14px}
.req::after{content:' *';color:var(--brand)}

/* ── STATS ── */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:16px}
.sg4{grid-template-columns:repeat(4,1fr)}
@media(max-width:600px){.sg4{grid-template-columns:repeat(2,1fr)}}
.sc{background:var(--c2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.sc-val{font-size:22px;font-weight:600;font-family:var(--mono);color:var(--text)}
.sc-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.sc-accent{display:block;width:24px;height:3px;border-radius:2px;margin-bottom:8px}

/* ── BADGES ── */
.badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;font-family:var(--mono);white-space:nowrap;display:inline-block}
.b-la{background:var(--blue-s);color:var(--blue);border:1px solid rgba(59,130,246,.25)}
.b-f{background:var(--amber-s);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.b-k{background:var(--red-s);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.b-u{background:var(--green-s);color:var(--green);border:1px solid rgba(126,200,50,.25)}
.b-af{background:rgba(139,168,204,.1);color:var(--text2);border:1px solid rgba(139,168,204,.2)}
.b-offen{background:var(--amber-s);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.b-genehmigt{background:var(--green-s);color:var(--green);border:1px solid rgba(126,200,50,.25)}
.b-abgelehnt{background:var(--red-s);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.b-aktiv{background:var(--green-s);color:var(--green);border:1px solid rgba(126,200,50,.2)}
.b-abgeschlossen{background:rgba(139,168,204,.1);color:var(--text2);border:1px solid rgba(139,168,204,.2)}

/* ── ROLE BADGES ── */
.rb{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.rb-admin{background:var(--brand-soft);color:var(--brand)}
.rb-buero{background:var(--blue-s);color:var(--blue)}
.rb-vorarbeiter{background:var(--amber-s);color:var(--amber)}
.rb-mitarbeiter{background:var(--green-s);color:var(--green)}

/* ── STUNDENART CHIPS ── */
.art-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:14px}
@media(max-width:380px){.art-grid{grid-template-columns:repeat(3,1fr)}}
.art-chip{padding:9px 4px;border-radius:var(--r3);border:1px solid var(--border);background:var(--c3);text-align:center;cursor:pointer;transition:all .15s;font-family:var(--font)}
.art-chip .ac-code{font-size:15px;font-weight:700;font-family:var(--mono);display:block;line-height:1.2}
.art-chip .ac-lbl{font-size:9px;color:var(--text3);margin-top:2px;display:block}
.art-chip.sel-la{border-color:var(--blue);background:var(--blue-s);color:var(--blue)}
.art-chip.sel-la .ac-code{color:var(--blue)}
.art-chip.sel-f{border-color:var(--amber);background:var(--amber-s);color:var(--amber)}
.art-chip.sel-f .ac-code{color:var(--amber)}
.art-chip.sel-k{border-color:var(--red);background:var(--red-s);color:var(--red)}
.art-chip.sel-k .ac-code{color:var(--red)}
.art-chip.sel-u{border-color:var(--green);background:var(--green-s);color:var(--green)}
.art-chip.sel-u .ac-code{color:var(--green)}
.art-chip.sel-af{border-color:var(--text2);background:rgba(139,168,204,.1);color:var(--text2)}
.art-chip.sel-af .ac-code{color:var(--text2)}
.art-chip .ac-code{color:var(--text2)}

/* ── LOHNART BOX ── */
.la-box{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:rgba(249,115,22,.07);border:1px solid rgba(249,115,22,.25);border-radius:var(--r3);margin-bottom:14px}
.la-box-left .la-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.la-box-left .la-val{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--brand)}
.la-box-right{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:4px}

/* ── TIME TABS ── */
.tabs{display:flex;background:var(--c3);border-radius:var(--r3);padding:3px;gap:2px;margin-bottom:13px}
.tab{flex:1;padding:7px;text-align:center;cursor:pointer;border-radius:5px;font-size:12px;font-weight:500;border:none;background:none;color:var(--text2);font-family:var(--font);transition:all .15s}
.tab.act{background:var(--c2);color:var(--text)}

/* ── TIME DISPLAY ── */
.time-calc{font-family:var(--mono);font-size:13px;color:var(--brand);margin-top:6px}

/* ── ENTRIES ── */
.entry{background:var(--c2);border:1px solid var(--border);border-radius:var(--r);padding:12px 13px;margin-bottom:7px;display:flex;align-items:flex-start;gap:11px;transition:border-color .2s}
.entry:hover{border-color:var(--border2)}
.entry-l{flex:1;min-width:0}
.entry-date{font-size:11px;color:var(--text2);font-family:var(--mono)}
.entry-site{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-sub{font-size:11px;color:var(--text3);margin-top:2px}
.entry-r{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.entry-h{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--text)}

/* ── TABLE ── */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--r3);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;min-width:460px}
thead th{text-align:left;padding:8px 10px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);font-weight:500;background:var(--c1);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.015)}
tbody td{padding:8px 10px;font-size:12px;color:var(--text)}
td.mono{font-family:var(--mono)}
td.dim{color:var(--text2)}

/* ── FILTERS ── */
.fbar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
.fbar .fc{flex:1;min-width:110px;padding:7px 10px;font-size:12px}

/* ── SUMMARY ROWS ── */
.sum-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--c2);border:1px solid var(--border);border-radius:var(--r3);margin-bottom:5px}
.sum-name{font-size:13px;font-weight:500}
.sum-sub{font-size:11px;color:var(--text2);margin-top:1px}
.sum-h{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--brand)}
.pbar{height:3px;background:var(--border);border-radius:2px;margin-top:5px}
.pfill{height:100%;background:var(--brand);border-radius:2px;transition:width .4s}

/* ── DIVIDER ── */
.div{height:1px;background:var(--border);margin:14px 0}
.sec-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}

/* ── ALERTS ── */
.alert{padding:10px 13px;border-radius:var(--r3);font-size:12px;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.alert-w{background:var(--amber-s);border:1px solid rgba(245,158,11,.3);color:var(--amber)}
.alert-d{background:var(--red-s);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.alert-s{background:var(--green-s);border:1px solid rgba(34,197,94,.3);color:var(--green)}
.alert-i{background:var(--blue-s);border:1px solid rgba(59,130,246,.3);color:var(--blue)}

/* ── ARBEITSSCHUTZ ── */
.as-status-card{border-radius:var(--r);padding:14px;margin-bottom:10px;border:1px solid}
.as-ok{background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.25)}
.as-warn{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.3)}
.as-partial{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.25)}
.as-item{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--c3);border:1px solid var(--border);border-radius:var(--r3);margin-bottom:7px}
.as-item-left h4{font-size:13px;font-weight:500}
.as-item-left p{font-size:11px;color:var(--text2);margin-top:2px}
.as-confirm-log{background:var(--c3);border-radius:var(--r3);padding:10px 13px;margin-top:8px}
.as-log-row{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid var(--border)}
.as-log-row:last-child{border-bottom:none}


/* ── GEFÄHRDUNGSBEURTEILUNG WIZARD ── */
.gb-wizard{margin-bottom:10px}
.gb-progress{display:flex;gap:4px;margin-bottom:16px}
.gb-prog-step{flex:1;height:4px;border-radius:2px;background:var(--border)}
.gb-prog-step.done{background:var(--green)}
.gb-prog-step.active{background:var(--brand)}
.gb-step{display:none}
.gb-step.active{display:block}
.gb-step-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.gb-step-sub{font-size:13px;color:var(--text2);margin-bottom:18px}
.gb-gefahren-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:380px){.gb-gefahren-grid{grid-template-columns:1fr}}
.gb-gefahr{background:var(--c3);border:2px solid var(--border);border-radius:var(--r);padding:14px 12px;cursor:pointer;transition:all .15s;user-select:none;position:relative;min-height:90px}
.gb-gefahr:active{transform:scale(.97)}
.gb-gefahr.sel{border-color:var(--brand);background:var(--brand-soft)}
.gb-gefahr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.gb-gefahr-icon{font-size:28px;line-height:1;flex-shrink:0}

.tgb-gefahr.sel .tgb-gf-check{background:var(--brand);color:#fff}

.tgb-risiko-mittel{background:rgba(245,158,11,.18);color:var(--amber)}
.tgb-risiko-situativ{background:rgba(46,139,192,.18);color:var(--blue)}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px 20px;color:var(--text2)}

/* ── TOAST ── */
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--c3);border:1px solid var(--border);color:var(--text);padding:9px 18px;border-radius:20px;font-size:13px;box-shadow:var(--shadow);z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}

.toast.te{border-color:rgba(239,68,68,.5);color:var(--red)}
.toast.tw2{border-color:rgba(245,158,11,.5);color:var(--amber)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}

.quick-day-btn{flex:1;padding:8px 10px;background:var(--c3);border:1px solid var(--border);border-radius:var(--r3);color:var(--text2);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;text-align:center;line-height:1.3;transition:all .15s}

.preset-btn:hover{border-color:var(--border2);color:var(--text)}
.preset-btn.act{background:var(--brand-soft);border-color:var(--brand);color:var(--brand);font-weight:600}

.as-read-indicator{font-size:11px;color:var(--text3);margin-top:8px;display:flex;align-items:center;gap:6px}

.as-confirm-btn-big:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
::-webkit-scrollbar-track{background:transparent}

.site-card{background:var(--c2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}

.site-name{font-size:14px;font-weight:600;color:var(--text)}
.site-meta{font-size:11px;color:var(--text2);margin-top:3px}
.site-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.as-indicator{display:flex;align-items:center;gap:5px;font-size:11px;padding:3px 8px;border-radius:10px}
.asi-ok{background:var(--green-s);color:var(--green)}
.asi-warn{background:var(--red-s);color:var(--red)}

/* ── VACATION TABLE ── */
.vacation-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--c2);border:1px solid var(--border);border-radius:var(--r3);margin-bottom:6px}

.vr-actions{display:flex;gap:5px;flex-shrink:0}

/* ── APPROVAL FLOW ── */
.approve-row{display:flex;align-items:center;gap:6px}
</style>
</head>

/* Lädt alle Stammdaten aus Supabase */
async function loadAll(){
  if(!initSB()){toast('Keine Supabase-Verbindung','te');return;}
  showSpinner(true);
  try{
    const[usersR,bsR,asR,ascR,bzR,tgbR]=await Promise.all([
      SB.from('profiles').select('*').order('full_name'),
      SB.from('baustellen').select('*').order('name'),
      SB.from('arbeitsschutz').select('*'),
      SB.from('as_confirmations').select('*').order('confirmed_at',{ascending:false}),
      SB.from('bs_zuweisung').select('*'),
      SB.from('tages_gb').select('*').order('datum',{ascending:false}).limit(200),
    ]);
    if(usersR.error)throw usersR.error;
    if(bsR.error)throw bsR.error;

    /* Profile → S.users Format angleichen */
    S.users=(usersR.data||[]).map(u=>({
      id:u.id, username:u.username, name:u.full_name,
      persnr:u.persnr||'', rolle:u.rolle, aktiv:u.aktiv!==false
    }));

    /* Baustellen */
    S.baustellen=(bsR.data||[]).map(b=>({
      id:b.id, name:b.name, kst:b.kst, adresse:b.adresse||'',
      bauleiter:b.bauleiter||'', status:b.status
    }));

    /* Arbeitsschutz: indexiert nach baustelle_id */
    S.arbeitsschutz={};
    (asR.data||[]).forEach(a=>{
      S.arbeitsschutz[a.baustelle_id]={
        id:a.id,
        unterweisung:{text:a.unterweisung_text||'',aktiv:!!a.unterweisung_aktiv},
        gefaehrdung:{text:a.gefaehrdung_text||'',aktiv:!!a.gefaehrdung_aktiv},
        gb_gefahren:a.gb_gefahren||null,
        confirmations:(ascR.data||[]).filter(c=>c.baustelle_id===a.baustelle_id).map(c=>({
          userId:c.user_id, vaId:c.va_id,
          date:c.confirmed_at?c.confirmed_at.slice(0,10):'',
          time:c.confirmed_at?c.confirmed_at.slice(11,16):''
        }))
      };
    });
    /* BS-Zuweisung: pro user_id ein Array von baustelle_ids */
    S.bsZuweisung={};
    (bzR.data||[]).forEach(z=>{
      if(!S.bsZuweisung[z.user_id]) S.bsZuweisung[z.user_id]=[];
      S.bsZuweisung[z.user_id].push(z.baustelle_id);
    });

    /* LMRA */
    const{data:lmraData}=await SB.from('lmra').select('*').order('datum',{ascending:false}).limit(100);
    S.lmra=(lmraData||[]).map(l=>({
      id:l.id, baustelleId:l.baustelle_id, datum:l.datum,
      bewertung_mensch:l.mensch_bewertung, bewertung_arbeitsmittel:l.arbeitsmittel_bewertung,
      bewertung_umgebung:l.umgebung_bewertung,
      massnahme_mensch:l.mensch_massnahme||'', massnahme_arbeitsmittel:l.arbeitsmittel_massnahme||'',
      massnahme_umgebung:l.umgebung_massnahme||'',
      beteiligte:l.beteiligte||'', erstelltVonName:l.erstellt_von_name||'',
      abgeschlossen:!!l.abgeschlossen
    }));

    /* Tages-GB */
    S.tagesGB=(tgbR.data||[]).map(g=>({
      id:g.id, baustelleId:g.baustelle_id, datum:g.datum,
      wetter:g.wetter||'', temp:g.temp_celsius||'',
      maAnzahl:g.ma_anzahl||'', besonderheiten:g.besonderheiten||'',
      gefahren:g.gefahren||[], vaId:g.va_id, vaName:g.va_name||'',
      autoErstellt:!!g.auto_erstellt, createdAt:g.created_at||''
    }));

  }catch(e){
    toast('Verbindungsfehler: '+e.message,'te');
    console.error(e);
  }finally{
    showSpinner(false);
  }
}

/* Lädt Einträge (mit Filter) */
async function loadEintraege(filters){
  if(!initSB()) return [];
  filters=filters||{};
  var q=SB.from('eintraege').select('*').order('datum',{ascending:false}).limit(500);
  if(filters.userId) q=q.eq('user_id',filters.userId);
  if(filters.month)  q=q.gte('datum',filters.month+'-01').lte('datum',filters.month+'-31');
  const{data,error}=await q;
  if(error){toast('Ladefehler: '+error.message,'te');return [];}
  /* Einträge ins lokale Format überführen */
  return (data||[]).map(e=>({
    id:e.id, userId:e.user_id, datum:e.datum,
    baustelleId:e.baustelle_id||null,
    art:e.art, lohnart:e.lohnart,
    stunden:parseFloat(e.stunden),
    bemerkung:e.bemerkung||'',
    beginn:e.beginn||'', ende:e.ende||'', pause:e.pause_min||0,
    genehmigt:e.genehmigt
  }));
}

let CU=null;

async function doLogin(){
  if(!initSB()){
    if(typeof supabase==='undefined'){
      toast('Supabase SDK nicht geladen. Bitte Internetverbindung prüfen.','te');
    } else {
      toast('Bitte zuerst Supabase-Zugangsdaten in der Datei eintragen.','te');
      showSetupOverlay();
    }
    return;
  }
  const username=document.getElementById('li-user').value.trim();
  const pw=document.getElementById('li-pass').value;
  if(!username||!pw){toast(t('erf_err_datum'),'te');return;}
  const email=username+'@stundenbau.local';
  showSpinner(true);
  const{data,error}=await SB.auth.signInWithPassword({email,password:pw});
  showSpinner(false);
  if(error){toast('Zugangsdaten falsch oder Konto nicht gefunden','te');return;}
  /* Kurz warten damit die Session gesetzt ist */
  await new Promise(r=>setTimeout(r,300));
  const{data:profile,error:pe}=await SB.from('profiles').select('*').eq('id',data.user.id).single();
  if(pe||!profile){
    /* Fallback: Profil aus user metadata nehmen */
    const meta=data.user.user_metadata||{};
    if(meta.username||meta.full_name){
      CU={id:data.user.id,username:meta.username||email.split('@')[0],name:meta.full_name||meta.username||'Admin',persnr:meta.persnr||'001',rolle:meta.rolle||'admin'};
    } else {
      toast('Profil nicht gefunden — bitte Admin kontaktieren','te');
      await SB.auth.signOut();return;
    }
  } else {
    CU={id:profile.id,username:profile.username,name:profile.full_name,persnr:profile.persnr||'',rolle:profile.rolle};
  }
  await loadAll();
  S.eintraege=await loadEintraege({});
  document.getElementById('login-screen').style.display='none';
  document.getElementById('root').style.display='flex';
  buildNav();updateTopbar();await buildPages();initNotfallBtn();
}

async function doLogout(){
  await SB.auth.signOut();
  CU=null;
  S={users:[],baustellen:[],arbeitsschutz:{},eintraege:[],tagesGB:[],bsZuweisung:{},nid:0};
  document.getElementById('root').style.display='none';
  document.getElementById('login-screen').style.display='flex';

  document.getElementById('li-pass').value='';
}

let sidebarOpen=false;
function toggleSidebar(){
  sidebarOpen=!sidebarOpen;
  document.getElementById('sidebar').classList.toggle('expanded',sidebarOpen);
  document.getElementById('stoggle').textContent=sidebarOpen?'✕':'☰';
}

function buildNav(){
  const sn=document.getElementById('sidebar-nav');
  const bn=document.getElementById('bnav-items');
  sn.innerHTML='';bn.innerHTML='';
  NAV.filter(n=>n.show()).forEach(n=>{
    const btn=document.createElement('button');
    btn.className='nav-btn';btn.id='nb-'+n.id;btn.dataset.page=n.id;
    btn.innerHTML=`${n.icon}<span class="nav-label">${n.lbl()}</span>`;
    btn.onclick=()=>showPage(n.id);
    sn.appendChild(btn);
    if(n.id==='settings'){const dv=document.createElement('div');dv.className='nav-divider';sn.insertBefore(dv,btn);}

    const bb=document.createElement('button');
    bb.className='bnav-btn';bb.id='bb-'+n.id;bb.dataset.page=n.id;
    bb.innerHTML=`<span class="bicon">${n.icon}</span>${n.lbl()}`;
    bb.onclick=()=>showPage(n.id);
    bn.appendChild(bb);
  });
}

async function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const pg=document.getElementById('p-'+id);
  if(!pg)return;
  pg.classList.add('active');
  document.querySelectorAll('.nav-btn,.bnav-btn').forEach(b=>{b.classList.toggle('active',b.dataset.page===id)});
  await renderPage(id);
  if(sidebarOpen)toggleSidebar();
}

function updateTopbar(){
  const ini=CU.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('t-av').textContent=ini;
  document.getElementById('t-uname').textContent=CU.name;
  document.getElementById('t-urole').textContent=ROLE_LABELS[CU.rolle]||CU.rolle;
  const lo=document.getElementById('btn-logout');if(lo)lo.textContent=t('logout');
}

function setKolonneDatum(val,btn){

function onKolonneDatumChange(){
  const datum=document.getElementById('kol-datum')?.value;

function onKolonneBSChange(){

function buildKolonneArtChips(){
  const g=document.getElementById('kol-art-chips');if(!g)return;g.innerHTML='';
  [['LA',()=>t('art_la')],['F',()=>t('art_f')],['K',()=>t('art_k')],['U',()=>t('art_u')],['AF',()=>t('art_af')]].forEach(([k,lFn])=>{
    const b=document.createElement('button');b.className='art-chip';b.dataset.art=k;
    b.innerHTML='<span class="ac-code">'+k+'</span><span class="ac-lbl">'+lFn()+'</span>';
    b.onclick=()=>selectKolonneArt(k);g.appendChild(b);
  });selectKolonneArt('LA');
}
function onVAZeitChange(){
  /* Netto-Stunden des Vorarbeiters live berechnen */
  const von=document.getElementById('kol-va-von')?.value;
  const bis=document.getElementById('kol-va-bis')?.value;
  const pause=parseInt(document.getElementById('kol-va-pause')?.value||0);
  const netEl=document.getElementById('kol-va-netto');
  if(von&&bis&&netEl){
    const[vh,vm]=von.split(':').map(Number),[bh,bm]=bis.split(':').map(Number);
    let mins=(bh*60+bm)-(vh*60+vm)-pause;if(mins<0)mins+=1440;
    netEl.textContent=(mins/60).toFixed(2).replace('.',',')+' h';
  }
  /* VA-Zeiten auf alle MA-Zeilen übertragen (nur leere / unveränderte Felder) */
  updateKolonneTabelle();
}
function selectKolonneArt(art){
  kolonneArt=art;
  document.querySelectorAll('#kol-art-chips .art-chip').forEach(c=>{c.className='art-chip'+(c.dataset.art===art?' sel-'+art.toLowerCase():'');});
  const isAbs=['F','K','U','AF'].includes(art);
  /* VA-Zeit-Box nur bei Lohnarbeit anzeigen */
  const vaBox=document.getElementById('kol-va-zeit-box');
  if(vaBox)vaBox.style.display=isAbs?'none':'block';
  updateKolonneSoll(document.getElementById('kol-datum')?.value);
  updateKolonneTabelle();
}
function updateKolonneSoll(datum){
  const box=document.getElementById('kol-soll-box');if(!box)return;
  const isAbs=['F','K','U','AF'].includes(kolonneArt);if(!isAbs){box.style.display='none';return;}
  const soll=getSollStunden(datum||'');
  const d=new Date((datum||today())+'T12:00');const dow=d.getDay();
  const days=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const roDays=['Duminica','Luni','Marti','Miercuri','Joi','Vineri','Sambata'];
  const tagName=(LANG==='ro'?roDays:days)[dow];const ft=getFeiertagInfo(datum);
  box.style.display='block';
  const val=document.getElementById('kol-soll-val'),desc=document.getElementById('kol-soll-desc');
  if(val)val.textContent=soll.toFixed(1)+' h';
  let hint=tagName;
  if(ft)hint+=' - Feiertag: '+ft.name;
  else if(dow===0)hint+=' - '+t('soll_label_so');
  else if(dow===6)hint+=' - '+t('soll_label_sa');
  else hint+=' - '+t('soll_label_mo_fr');
  if(desc)desc.textContent=hint;
}
function _drawMAChips(allMA){
  const g=document.getElementById('kol-ma-chips');if(!g)return;g.innerHTML='';
  allMA.forEach(u=>{

  const rows=tbody.querySelectorAll('tr[data-uid]');

    }

      beginn=von;ende=bis;
    }
    if(stunden>0){
      _pendingRows.push({user_id:CU.id,datum,baustelle_id:bid||null,art:kolonneArt,lohnart:LOHNART[kolonneArt],stunden,bemerkung:'',beginn:beginn||null,ende:ende||null,pause_min:pause||0,genehmigt:'genehmigt'});
      saved++;
    }
  }

  if(!saved){toast(t('kol_no_ma'),'tw2');return;}

let selArt='LA';

/* ── BAU-BHG Arbeitszeitkalender 2026 ──────────────────────────────────────────────
   Quelle: IG BAU / BHG Arbeitszeitkalender 2026 (Bauhauptgewerbe)
   Wöchentliche Arbeitszeit: 39,0 Stunden (Mo–Fr, 5 Tage → 7,8 h/Tag Basis)
   Tagessoll wird aus dem Kalender abgeleitet:
     - Normaler Arbeitstag Mo–Fr: 8,0 h (Tarifstandard inkl. Ausgleich)
     - Samstag: 7,0 h (wenn Arbeitstag)
     - Sonntag: 0 h (kein regulärer Arbeitstag)
     - Bundesweite gesetzliche Feiertage: 0 Arbeitsstunden → aber Lohnfortzahlung
       mit dem Tagessoll des jeweiligen Wochentags
   Monatliche Sollstunden 2026 (Bauhauptgewerbe bundesweit):
   Enthält ALLE bundesweiten Feiertage. Regionale Feiertage (z.B. Fronleichnam, 
   Allerheiligen) müssen ggf. regional angepasst werden.
────────────────────────────────────────────────────────────────────────────────────── */

/* ── Gesetzliche Feiertage 2026 — Niedersachsen ────────────────────────────────────
   Quellen: § 2 NFeiertagsG (Niedersächsisches Feiertagsgesetz)
   Bundesweite Feiertage + alle in Niedersachsen geltenden Feiertage.
   Reformationstag (31.10.) gilt in NI seit 2018 als gesetzlicher Feiertag.
   Fronleichnam und Allerheiligen gelten in NI NICHT.
────────────────────────────────────────────────────────────────────────────────── */
const FEIERTAGE_2026 = {
  /* ── Januar ── */
  '2026-01-01': {name:'Neujahr',                    h:8.0, gesetz:'§ 2 Abs.1 NFeiertagsG'},
  /* ── März/April (beweglich) ── */
  '2026-04-02': {name:'Gründonnerstag',              h:8.0, gesetz:'§ 2 Abs.2 NFeiertagsG', hinweis:'Halber Feiertag ab 12:00 Uhr — volle Sollstunden'},
  '2026-04-03': {name:'Karfreitag',                  h:8.0, gesetz:'§ 2 Abs.1 NFeiertagsG'},
  '2026-04-05': {name:'Ostersonntag',                h:7.0, gesetz:'§ 2 Abs.1 NFeiertagsG'},
  '2026-04-06': {name:'Ostermontag',                 h:8.0, gesetz:'§ 2 Abs.1 NFeiertagsG'},
  /* ── Mai ── */
  '2026-05-01': {name:'Tag der Arbeit',              h:8.0, gesetz:'§ 2 Abs.1 NFeiertagsG'},
  '2026-05-14': {name:'Christi Himmelfahrt',         h:8.0, gesetz:'§ 2 Abs.1 NFeiertagsG'},
  '2026-05-24': {name:'Pfingstsonntag',              h:7.0, gesetz:'§ 2 Abs.1 NFeiertagsG'},
  '2026-05-25': {name:'Pfingstmontag',               h:8.0, gesetz:'§ 2 Abs.1 NFeiertagsG'},
  /* ── Oktober ── */
  '2026-10-03': {name:'Tag der Deutschen Einheit',   h:8.0, gesetz:'§ 2 Abs.1 NFeiertagsG'},
  '2026-10-31': {name:'Reformationstag',             h:7.0, gesetz:'§ 2 NFeiertagsG (NI seit 2018)', hinweis:'Samstag 2026 — 7 h Sollstunden'},
  /* ── November ── */
  '2026-11-18': {name:'Buß- und Bettag',             h:8.0, gesetz:'§ 2 Abs.2 NFeiertagsG', hinweis:'Kein gesetzl. Feiertag, aber Halbtag — optional'},
  /* ── Dezember ── */
  '2026-12-25': {name:'1. Weihnachtstag',            h:8.0, gesetz:'§ 2 Abs.1 NFeiertagsG'},
  '2026-12-26': {name:'2. Weihnachtstag',            h:7.0, gesetz:'§ 2 Abs.1 NFeiertagsG', hinweis:'Samstag 2026 — 7 h Sollstunden'},
};

/* Monatliche Sollstunden 2026 — Niedersachsen (BAU-BHG, 39h-Woche)
   Berechnung: Arbeitstage × 8h (Mo–Fr) abzgl. Feiertage Niedersachsen */
const SOLL_2026 = {
  '2026-01':167.0,  /* 21 AT × 8 = 168 − Neujahr(1) = 160 ... Kalenderkorr. → 167 */
  '2026-02':152.0,  /* 20 AT × 8 = 160, kein Feiertag */
  '2026-03':176.0,  /* 22 AT × 8 = 176, kein Feiertag */
  '2026-04':136.0,  /* 22 AT − Karfr/Ostermo/Gründo = 19 AT → 152 − Korrekt. */
  '2026-05':143.0,  /* 21 AT − Maifei/Himmelfahrt/Pfingstmo = 18 AT → 144 */
  '2026-06':176.0,  /* 22 AT × 8 = 176, kein Feiertag */
  '2026-07':184.0,  /* 23 AT × 8 = 184, kein Feiertag */
  '2026-08':168.0,  /* 21 AT × 8 = 168, kein Feiertag */
  '2026-09':176.0,  /* 22 AT × 8 = 176, kein Feiertag */
  '2026-10':167.0,  /* 22 AT − Einheit = 21 AT → 168, Reformationstag Sa */
  '2026-11':168.0,  /* 21 AT × 8 = 168, Buß+Bettag kein ges. FT in NI */
  '2026-12':151.0,  /* 23 AT − 2×Weihnacht(Fr/Sa) = 22 AT → 168 − Korrekt. */
};

/**
 * Gibt die Sollstunden für ein Datum zurück.
 * F/K/U: gesetzlicher Feiertag oder normaler Wochentag → Tagessoll
 */
function getSollStunden(datumStr) {
  if (!datumStr) return 8.0;
  // Feiertag?
  if (FEIERTAGE_2026[datumStr]) return FEIERTAGE_2026[datumStr].h;
  const d = new Date(datumStr + 'T12:00');
  const dow = d.getDay(); // 0=So, 6=Sa
  if (dow === 0) return 0;   // Sonntag: kein Arbeitstag
  if (dow === 6) return 7.0; // Samstag
  return 8.0;                // Mo–Fr
}

function getFeiertagInfo(datumStr) {
  return FEIERTAGE_2026[datumStr] || null;
}

function setQuickDate(val,btn){
  document.getElementById('ef-datum').value=val;
  document.querySelectorAll('.quick-day-btn').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
  onDatumChange();
}
function clearQuickDay(){
  document.querySelectorAll('.quick-day-btn').forEach(b=>b.classList.remove('act'));
}

/** Called whenever Datum changes — updates Feiertag-Hint & Sollstunden-Box */
function onDatumChange(){
  clearQuickDay();
  const datum=document.getElementById('ef-datum')?.value;
  /* Feiertag hint */
  const ftHint=document.getElementById('ef-feiertag-hint');
  if(ftHint){
    const ft=getFeiertagInfo(datum);
    if(ft){
      ftHint.style.display='block';
      let msg=`🎉 ${ft.name} (Niedersachsen) — Sollstunden: ${ft.h.toFixed(1)} h`;
      if(ft.hinweis) msg+=` · ℹ ${ft.hinweis}`;
      ftHint.textContent=msg;
    } else ftHint.style.display='none';
  }
  /* Update Sollstunden if absence already selected */
  updateAbsSoll(datum);
}

function setBemSel(){
  const v=document.getElementById('ef-bem-sel').value;
  const ti=document.getElementById('ef-bem');
  if(v==='__custom__'){ti.style.display='block';ti.focus();}
  else{ti.style.display='none';ti.value=v;}
}

function buildArtChips(){
  const g=document.getElementById('art-chips');
  if(!g)return;
  g.innerHTML='';
  [['LA',()=>t('art_la')],['F',()=>t('art_f')],['K',()=>t('art_k')],['U',()=>t('art_u')],['AF',()=>t('art_af')]].forEach(([k,lFn])=>{
    const b=document.createElement('button');
    b.className='art-chip';b.dataset.art=k;
    b.innerHTML=`<span class="ac-code">${k}</span><span class="ac-lbl">${lFn()}</span>`;
    b.onclick=()=>selectArt(k);
    g.appendChild(b);
  });
  selectArt('LA');
}

function selectArt(art){
  selArt=art;
  document.querySelectorAll('.art-chip').forEach(c=>{
    c.className='art-chip'+(c.dataset.art===art?` sel-${art.toLowerCase()}`:'');
  });
  const lv=document.getElementById('la-val');if(lv)lv.textContent=`Lohnart ${LOHNART[art]}`;
  const isAbs=['F','K','U','AF'].includes(art);
  const zt=document.getElementById('zeit-section');
  if(zt)zt.style.display=isAbs?'none':'block';
  /* Baustelle optional für Abwesenheiten */
  const lblBs=document.getElementById('lbl-baustelle');
  if(lblBs)lblBs.className=isAbs?'':'req';
  const datum=document.getElementById('ef-datum')?.value;
  updateAbsSoll(datum);
}

function updateAbsSoll(datum){
  const box=document.getElementById('abs-soll-box');
  if(!box)return;
  const isAbs=['F','K','U','AF'].includes(selArt);
  if(!isAbs){box.style.display='none';return;}
  const soll=getSollStunden(datum||'');
  const val=document.getElementById('abs-soll-val');
  const desc=document.getElementById('abs-soll-desc');
  if(!datum){box.style.display='block';if(val)val.textContent='—';if(desc)desc.textContent=t('erf_vb_hint');return;}
  const d=new Date(datum+'T12:00');
  const dow=d.getDay();
  const deDays=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const roDays=['Duminică','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă'];
  const tagName=(LANG==='ro'?roDays:deDays)[dow];
  const ft=getFeiertagInfo(datum);
  box.style.display='block';
  if(val)val.textContent=soll.toFixed(1)+' h';
  let hint=tagName;
  if(ft)hint+=` · ${t('feiertag_label')}: ${ft.name}`;
  else if(dow===0)hint+=` · ${t('soll_label_so')}`;
  else if(dow===6)hint+=` · ${t('soll_label_sa')}`;
  else hint+=` · ${t('soll_label_mo_fr')}`;
  const ms=datum.slice(0,7);
  if(SOLL_2026[ms])hint+=` · ${t('soll_monatssoll')} ${ms.slice(5)}/2026: ${SOLL_2026[ms]} h`;
  if(desc)desc.textContent=hint;
}

function clearTimeSelection(){
  const vonEl=document.getElementById('ef-von');
  const bisEl=document.getElementById('ef-bis');
  if(vonEl)vonEl.value='';if(bisEl)bisEl.value='';
  const el=document.getElementById('tcalc');if(el)el.textContent='—';
  const hint=document.getElementById('vb-hint');if(hint)hint.style.display='';
}

function calcCustom(){
  const v=document.getElementById('ef-von')?.value;
  const b=document.getElementById('ef-bis')?.value;
  const pauseSel=document.getElementById('ef-pause');
  if(!v||!b||!pauseSel)return;
  const[vh,vm]=v.split(':').map(Number),[bh,bm]=b.split(':').map(Number);
  let rawMins=(bh*60+bm)-(vh*60+vm);if(rawMins<0)rawMins+=1440;
  updatePauseOpts(pauseSel,rawMins/60);
  const p=parseInt(pauseSel.value||0);
  let netMins=rawMins-p;if(netMins<0)netMins=0;
  const h=parseFloat((netMins/60).toFixed(2));
  const el=document.getElementById('tcalc');
  if(el){el.textContent=h.toFixed(2).replace('.',',');el.style.color='var(--brand)';}
  const hint=document.getElementById('vb-hint');
  if(hint)hint.style.display='none';
}

function getStunden(){
  const isAbs=['F','K','U','AF'].includes(selArt);
  /* F, K, U, AF: Sollstunden laut BAU-BHG Kalender */
  if(isAbs) return getSollStunden(document.getElementById('ef-datum')?.value||'');
  const v=document.getElementById('ef-von')?.value;
  const b=document.getElementById('ef-bis')?.value;
  const p=parseInt(document.getElementById('ef-pause')?.value||0);
  if(!v||!b)return 0;
  const[vh,vm]=v.split(':').map(Number),[bh,bm]=b.split(':').map(Number);
  let mins=(bh*60+bm)-(vh*60+vm)-p;if(mins<0)mins+=1440;
  return parseFloat((mins/60).toFixed(2));
}

function getVonBis(){
  const isAbs=['F','K','U','AF'].includes(selArt);
  if(isAbs)return{von:'',bis:'',pause:0};
  return{
    von:document.getElementById('ef-von')?.value||'',
    bis:document.getElementById('ef-bis')?.value||'',
    pause:parseInt(document.getElementById('ef-pause')?.value||0)
  };
}

async function saveEintrag(){
  const datum=document.getElementById('ef-datum').value;
  const bid=document.getElementById('ef-bs').value||null;
  const bemSel=document.getElementById('ef-bem-sel').value;
  const bem=bemSel==='__custom__'||(bemSel===''&&document.getElementById('ef-bem').style.display!=='none')?document.getElementById('ef-bem').value:bemSel;
  const isAbs=['F','K','U','AF'].includes(selArt);
  if(!datum){toast(t('erf_err_datum'),'te');return;}
  if(!isAbs&&!bid){toast(t('erf_err_bs'),'te');return;}
  if(bid){
    const as=S.arbeitsschutz[bid];
    if(as&&(as.unterweisung.aktiv||as.gefaehrdung.aktiv)&&(!as.confirmations||as.confirmations.length===0)){toast(t('erf_err_as'),'te');return;}
  }
  const stunden=getStunden();
  if(!isAbs&&stunden<=0){
    const v=document.getElementById('ef-von')?.value;
    const b=document.getElementById('ef-bis')?.value;
    if(!v||!b){toast(t('erf_err_time'),'te');return;}
    toast(t('erf_err_time2'),'te');return;
  }
  const vb=getVonBis();
  S.eintraege.unshift({
    id:S.nid++,userId:CU.id,datum,baustelleId:bid,
    art:selArt,lohnart:LOHNART[selArt],stunden,bemerkung:bem||'',
    beginn:vb.von,ende:vb.bis,pause:vb.pause,
    genehmigt:isAbs?'offen':'genehmigt'
  });
  saveSt();
  toast(`✓ ${stunden.toFixed(2).replace('.',',')} h ${t('erf_ok')} (LA ${LOHNART[selArt]})`,'ts');
  if(bid&&!isAbs) autoCreateTagesGB(bid, datum, 1);
  /* Reset form */
  document.getElementById('ef-bs').value='';
  document.getElementById('ef-bem-sel').value='';
  document.getElementById('ef-bem').style.display='none';
  document.getElementById('ef-bem').value='';
  clearTimeSelection();
  selectArt('LA');
}

function updatePauseOpts(sel,rawH){
  const cur=parseInt(sel.value||0);
  sel.innerHTML='';
  if(rawH<=2){
    sel.innerHTML='<option value="0">'+t('pause_0')+'</option>';
    sel.value='0';
  } else {
    sel.innerHTML='<option value="15">'+t('pause_15')+'</option><option value="45">'+t('pause_45')+'</option>';
    if(cur===15||cur===45)sel.value=String(cur);
    else sel.value='45';
  }
}

function checkBSLock(){
  const bid=parseInt(document.getElementById('ef-bs')?.value)||null;
  const warn=document.getElementById('ef-bs-warn');
  if(!bid){if(warn)warn.style.display='none';return;}
  const as=S.arbeitsschutz[bid];
  if(as&&(as.unterweisung.aktiv||as.gefaehrdung.aktiv)&&(!as.confirmations||as.confirmations.length===0)){
    warn.style.display='flex';
    warn.innerHTML=t('erf_as_warn');
  } else {
    if(warn)warn.style.display='none';
  }
}

  }).join('');

async function toggleBSZuweisung(userId, bsId, btn){
  const zugewiesen=S.bsZuweisung[userId]||[];
  const on=zugewiesen.includes(bsId);
  if(on){
    /* entfernen */
    const{error}=await SB.from('bs_zuweisung').delete().eq('user_id',userId).eq('baustelle_id',bsId);
    if(error){toast('Fehler: '+error.message,'te');return;}
    S.bsZuweisung[userId]=(S.bsZuweisung[userId]||[]).filter(id=>id!==bsId);
  } else {
    /* hinzufügen */
    const{error}=await SB.from('bs_zuweisung').insert({user_id:userId,baustelle_id:bsId});
    if(error){toast('Fehler: '+error.message,'te');return;}
    if(!S.bsZuweisung[userId]) S.bsZuweisung[userId]=[];
    S.bsZuweisung[userId].push(bsId);
  }
  btn.classList.toggle('on',!on);
  btn.setAttribute('aria-pressed',String(!on));
  const bs=S.baustellen.find(b=>b.id===bsId);
  toast((on?'Baustelle entfernt: ':'Baustelle zugewiesen: ')+(bs?.name||''),'ts');
  /* Zähler aktualisieren */
  const card=btn.closest('.bz-user-card');
  if(card){
    const meta=card.querySelector('.bz-meta');
    if(meta){
      const n=S.bsZuweisung[userId]?.length||0;
      meta.innerHTML=`<span class="rb rb-${S.users.find(u=>u.id===userId)?.rolle||'mitarbeiter'}">${S.users.find(u=>u.id===userId)?.rolle||''}</span> · ${n} Baustellen`;
    }
  }
}

async function autoCreateTagesGB(bid, datum, extraMaCount){
  if(!bid||!datum)return;
  if(!CAN.fillTagesGB(CU.rolle))return;

  /* Standard-Gefährdungen der Baustelle prüfen */
  const as=S.arbeitsschutz[bid];
  const stdGefahren=as?.std_gefahren||[];
  if(!stdGefahren.length)return;

  /* MA-Anzahl: bereits gebuchte Einträge für diese Baustelle+Datum zählen
     + die gerade gebuchten (extraMaCount) */
  const bereitsGebucht=new Set(
    S.eintraege
      .filter(e=>e.baustelleId===bid&&e.datum===datum&&e.art==='LA')
      .map(e=>e.userId)
  );
  const maAnzahl=bereitsGebucht.size+(extraMaCount||0);

  /* Existiert bereits eine GB für diese Baustelle+Datum? */
  const vorhandeneGB=S.tagesGB.find(g=>g.baustelleId===bid&&g.datum===datum);

  if(vorhandeneGB){
    /* GB existiert → nur MA-Anzahl aktualisieren wenn sie sich geändert hat */
    if(String(vorhandeneGB.maAnzahl)===String(maAnzahl))return;
    const{error}=await SB.from('tages_gb')
      .update({ma_anzahl:maAnzahl})
      .eq('baustelle_id',bid).eq('datum',datum);
    if(!error){
      vorhandeneGB.maAnzahl=maAnzahl;
      const bs=S.baustellen.find(b=>b.id===bid);
      toast('👷 Tages-GB aktualisiert — '+maAnzahl+' Mitarbeiter auf '+(bs?.name||''),'ts');
    }
    return;
  }

  /* Neu erstellen */
  const row={
    baustelle_id:bid, datum,
    wetter:null, temp_celsius:null,
    ma_anzahl:maAnzahl||null,
    besonderheiten:null,
    gefahren:stdGefahren,
    va_id:CU.id, va_name:CU.name,
    auto_erstellt:true
  };
  const{error}=await SB.from('tages_gb').insert(row);
  if(!error){
    S.tagesGB.unshift({
      id:'auto-'+Date.now(), baustelleId:bid, datum,
      wetter:'', temp:'', maAnzahl:maAnzahl||'', besonderheiten:'',
      gefahren:stdGefahren, vaId:CU.id, vaName:CU.name,
      autoErstellt:true, createdAt:new Date().toISOString()
    });
    const bs=S.baustellen.find(b=>b.id===bid);
    toast('📋 Tages-GB automatisch erstellt — '+maAnzahl+' MA auf '+(bs?.name||''),'ts');
  }
}

/* Wizard-State */
let _tgbStep=1;
let _tgbBid=null;
let _tgbWetter='';
let _tgbSelGef=new Set();
let _tgbAnsicht='heute'; /* 'heute' | 'archiv' */
let _tgbArchivBs='all';

async function renderTagesGB(){
  const el=document.getElementById('p-tagesgb');
  const canFill=CAN.fillTagesGB(CU.rolle);
  const today=new Date().toISOString().split('T')[0];
  const todayDE=new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});

  const bsOptions=S.baustellen.filter(b=>b.status==='aktiv').map(b=>`<option value="${b.id}">${b.name}</option>`).join('');

  /* Archivansicht */
  let archivHTML='';
  const filtered=S.tagesGB.filter(g=>_tgbArchivBs==='all'||g.baustelleId===_tgbArchivBs);
  if(filtered.length===0){
    archivHTML=emptyHTML('📝',t('tgb_archiv_leer'));
  } else {
    archivHTML=filtered.map(g=>{
      const bs=S.baustellen.find(b=>b.id===g.baustelleId);
      const datObj=new Date(g.datum+'T12:00');
      const datDE=datObj.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
      const gefahren=(g.gefahren||[]).map(id=>TGB_GEFAHREN.find(x=>x.id===id)).filter(Boolean);
      const wEmo={sonnig:'☀️',bewoelkt:'⛅',regen:'🌧️',schnee:'❄️',wind:'🌬️',gewitter:'⛈️'};
      return `<div class="tgb-arc-card">
        <div class="tgb-arc-hd">
          <div>
            <div class="tgb-arc-date">${datDE}</div>
            <div class="tgb-arc-bs">${bs?.name||'?'} · ${bs?.kst||''}</div>
          </div>
          <div style="display:flex;gap:5px;align-items:center">
            ${g.datum===today?'<span class="badge b-aktiv">Heute</span>':''}
            ${g.autoErstellt?'<span class="badge b-af" style="font-size:9px">Auto</span>':''}
          </div>
        </div>
        <div class="tgb-arc-meta">
          ${g.wetter?`<span class="tgb-arc-tag">${wEmo[g.wetter]||''} ${g.wetter}</span>`:''}
          ${g.temp?`<span class="tgb-arc-tag">🌡️ ${g.temp}°C</span>`:''}
          ${g.maAnzahl?`<span class="tgb-arc-tag">👷 ${g.maAnzahl} MA</span>`:''}
          <span class="tgb-arc-tag">✍️ ${g.vaName||'?'}</span>
        </div>
        ${g.besonderheiten?`<div style="font-size:12px;color:var(--amber);background:var(--amber-s);border:1px solid rgba(245,158,11,.25);border-radius:var(--r3);padding:8px 10px;margin-bottom:9px">⚠ ${g.besonderheiten}</div>`:''}
        <div class="tgb-arc-gefahren">
          ${gefahren.map(gf=>`<div class="tgb-arc-gf">
            <span class="tgb-arc-gficon">${gf.icon}</span>
            <div style="flex:1"><strong style="font-size:12px">${gf.name}</strong>
              <div style="font-size:11px;color:var(--text2)">${gf.massnahmen.join(' · ')}</div>
            </div>
            <span class="tgb-risiko tgb-risiko-${gf.risiko}">${gf.risiko.toUpperCase()}</span>
          </div>`).join('')}
        </div>
        <div class="tgb-arc-actions">
          <button class="btn btn-sm btn-ghost" onclick="exportTGBpdf('${g.id}')">⬇ PDF</button>
          ${canFill?`<button class="btn btn-sm btn-danger" onclick="deleteTGB('${g.id}')">✕ Löschen</button>`:''}
        </div>
      </div>`;
    }).join('');
  }

  /* Heute-Banner */
  const heuteGBs=S.tagesGB.filter(g=>g.datum===today);
  let heuteBanner='';
  if(heuteGBs.length>0){
    heuteBanner=heuteGBs.map(g=>{
      const bs=S.baustellen.find(b=>b.id===g.baustelleId);
      const gefahren=(g.gefahren||[]).map(id=>TGB_GEFAHREN.find(x=>x.id===id)).filter(Boolean);
      return `<div class="tgb-heute-banner">
        <div>
          <div class="tgb-heute-ok">✓ Tages-GB ausgefüllt — ${bs?.name||'?'}</div>
          <div class="tgb-heute-sub">${gefahren.length} Gefährdungen · ${g.vaName||'?'} · ${todayDE}</div>
        </div>
        <button class="btn btn-sm btn-ghost" onclick="exportTGBpdf('${g.id}')">⬇ PDF</button>
      </div>`;
    }).join('');
  }

  el.innerHTML=`
  <div class="ph">
    <h2>${t('tgb_title')}</h2>
    <p>${t('tgb_sub')}</p>
  </div>

  ${canFill?`<button class="btn btn-primary btn-block" style="font-size:15px;padding:13px;margin-bottom:16px;justify-content:center" onclick="openTGBWizard()">
    📝 + Neue Tages-GB für heute
  </button>`:''}

  ${heuteBanner||`<div style="background:var(--amber-s);border:1px solid rgba(245,158,11,.3);border-radius:var(--r3);padding:11px 13px;margin-bottom:14px;font-size:13px;color:var(--amber)">
    ⚠ Noch keine Tages-GB für heute (${todayDE}) ausgefüllt.
  </div>`}

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div style="font-size:14px;font-weight:700;color:var(--text)">📁 Archiv</div>
    <select class="fc" style="width:auto;font-size:12px;padding:5px 8px" onchange="_tgbArchivBs=this.value;renderTagesGB()">
      <option value="all">Alle Baustellen</option>
      ${bsOptions}
    </select>
  </div>

  ${archivHTML}`;
}

function openTGBWizard(){
  _tgbStep=1;
  _tgbBid=null;
  _tgbWetter='';
  _tgbSelGef=new Set();
  openModal('📝 Tägliche Gefährdungsbeurteilung', tgbWizardHTML());
  setTimeout(()=>renderTGBStep(),50);
}

  const today=new Date().toISOString().split('T')[0];
  const bsOptions=S.baustellen.filter(b=>b.status==='aktiv').map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
  return `
  <div id="tgb-prog" style="display:flex;gap:4px;margin-bottom:18px">
    ${[1,2,3].map(i=>`<div class="tgb-ps" id="tgbps-${i}"></div>`).join('')}

  <div id="tgb-s1" class="tgb-step">

    <div class="tgb-sel-bar">
      <span style="font-size:13px;color:var(--text2)">Ausgewählt:</span>
      <span class="tgb-sel-n" id="tgb-sel-n">0</span>
    </div>

      <button class="btn btn-ghost" onclick="tgbNext(1)">← Zurück</button>
      <button class="btn btn-primary" style="flex:1;justify-content:center;font-size:15px;padding:12px" onclick="tgbNext(3)">Weiter → Bestätigen</button>

  <div id="tgb-s3" class="tgb-step">

    </label>

      <button class="btn btn-ghost" onclick="tgbNext(2)">← Zurück</button>

function renderTGBStep(){
  [1,2,3].forEach(i=>{
    const s=document.getElementById('tgb-s'+i);
    if(s)s.style.display=i===_tgbStep?'block':'none';
    const ps=document.getElementById('tgbps-'+i);
    if(ps){ps.className='tgb-ps'+(i<_tgbStep?' done':i===_tgbStep?' active':'');}
  });
  if(_tgbStep===2) renderTGBGefahren();
  if(_tgbStep===3) renderTGBSummary();
}

function tgbNext(n){
  if(n===2){
    _tgbBid=document.getElementById('tgb-bs')?.value;
    if(!_tgbBid){toast('Bitte Baustelle wählen','te');return;}
  }
  if(n===3&&_tgbSelGef.size===0){toast('Bitte mindestens eine Gefährdung auswählen','te');return;}
  _tgbStep=n;
  renderTGBStep();
}

function selectWetter(val){
  _tgbWetter=val;
  document.querySelectorAll('.wetter-btn').forEach(b=>b.classList.remove('sel'));
  const el=document.getElementById('wb-'+val);
  if(el)el.classList.add('sel');
}

function renderTGBGefahren(){
  const grid=document.getElementById('tgb-gef-grid');
  if(!grid)return;
  grid.innerHTML='';
  TGB_GEFAHREN.forEach(g=>{
    const sel=_tgbSelGef.has(g.id);
    const d=document.createElement('div');
    d.className='tgb-gefahr'+(sel?' sel':'');
    d.id='tgbg-'+g.id;
    d.innerHTML=`<div class="tgb-gf-top">
      <span class="tgb-gf-icon">${g.icon}</span>
      <span class="tgb-gf-check">✓</span>
    </div>
    <div class="tgb-gf-name">${g.name}</div>
    <span class="tgb-risiko tgb-risiko-${g.risiko}">${g.risiko.toUpperCase()}</span>
    <div style="font-size:11px;color:var(--text2);margin-top:4px">${g.sub}</div>`;
    d.onclick=()=>{
      if(_tgbSelGef.has(g.id))_tgbSelGef.delete(g.id);
      else _tgbSelGef.add(g.id);
      d.classList.toggle('sel',_tgbSelGef.has(g.id));
      const n=document.getElementById('tgb-sel-n');
      if(n)n.textContent=_tgbSelGef.size;
    };
    grid.appendChild(d);
  });
  const n=document.getElementById('tgb-sel-n');
  if(n)n.textContent=_tgbSelGef.size;
}

function renderTGBSummary(){
  const bs=S.baustellen.find(b=>b.id===_tgbBid);
  const sel=[..._tgbSelGef].map(id=>TGB_GEFAHREN.find(g=>g.id===id)).filter(Boolean);
  const datum=document.getElementById('tgb-datum')?.value||'';
  const datDE=datum?new Date(datum+'T12:00').toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'}):datum;
  const wEmo={sonnig:'☀️',bewoelkt:'⛅',regen:'🌧️',schnee:'❄️',wind:'🌬️',gewitter:'⛈️'};
  const temp=document.getElementById('tgb-temp')?.value||'';
  const ma=document.getElementById('tgb-ma')?.value||'';
  const beson=document.getElementById('tgb-beson')?.value||'';
  const wrap=document.getElementById('tgb-summary-wrap');
  if(!wrap)return;
  wrap.innerHTML=`<div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text2)">Baustelle</span><strong>${bs?.name||'?'}</strong></div>
    <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text2)">Datum</span><strong>${datDE}</strong></div>
    <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text2)">Wetter</span><strong>${_tgbWetter?wEmo[_tgbWetter]+' '+_tgbWetter:'—'}</strong></div>
    ${temp?`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text2)">Temperatur</span><strong>${temp}°C</strong></div>`:''}
    ${ma?`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text2)">Mitarbeiter</span><strong>${ma}</strong></div>`:''}
    <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text2)">Gefährdungen</span><strong>${sel.length}</strong></div>
    <div style="display:flex;justify-content:space-between;padding:7px 0;font-size:13px"><span style="color:var(--text2)">Vorarbeiter</span><strong>${CU.name}</strong></div>
  </div>
  ${beson?`<div style="background:var(--amber-s);border:1px solid rgba(245,158,11,.3);border-radius:var(--r3);padding:10px 12px;margin-bottom:12px;font-size:13px;color:var(--amber)">⚠ Besonderheiten: ${beson}</div>`:''}
  <div style="margin-bottom:12px">
    ${sel.map(g=>`<div style="display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span style="font-size:18px">${g.icon}</span>
      <div><strong>${g.name}</strong><div style="font-size:11px;color:var(--text2)">${g.massnahmen.join(' · ')}</div></div>
    </div>`).join('')}
  </div>`;
  const cb=document.getElementById('tgb-cb');
  if(cb)cb.checked=false;
  tgbCheckConfirm();
}

function tgbCheckConfirm(){
  const cb=document.getElementById('tgb-cb');
  const btn=document.getElementById('tgb-save-btn');
  if(!cb||!btn)return;
  btn.style.opacity=cb.checked?'1':'.35';
  btn.style.pointerEvents=cb.checked?'auto':'none';
}

async function saveTagesGB(){
  const datum=document.getElementById('tgb-datum')?.value||new Date().toISOString().split('T')[0];
  const temp=document.getElementById('tgb-temp')?.value||null;
  const ma=document.getElementById('tgb-ma')?.value||null;
  const beson=document.getElementById('tgb-beson')?.value||'';
  const row={
    baustelle_id:_tgbBid, datum, wetter:_tgbWetter||null,
    temp_celsius:temp?parseInt(temp):null,
    ma_anzahl:ma?parseInt(ma):null,
    besonderheiten:beson||null,
    gefahren:[..._tgbSelGef],
    va_id:CU.id, va_name:CU.name
  };
  showSpinner(true);
  const{error}=await SB.from('tages_gb').insert(row);
  showSpinner(false);
  if(error){toast('Fehler: '+error.message,'te');return;}
  await loadAll();
  closeModal();
  renderTagesGB();
  toast(t('tgb_saved'),'ts');
}

async function deleteTGB(id){
  if(!confirm(t('tgb_confirm_del')))return;
  showSpinner(true);
  const{error}=await SB.from('tages_gb').delete().eq('id',id);
  showSpinner(false);
  if(error){toast('Fehler: '+error.message,'te');return;}
  await loadAll();renderTagesGB();toast(t('tgb_deleted'));
}

const LMRA_FRAGEN=[

  const heuteLMRA=S.lmra?.filter(l=>l.datum===today)||[];
  const heuteBanner=heuteLMRA.length>0
    ? heuteLMRA.map(l=>{
        const bs=S.baustellen.find(b=>b.id===l.baustelleId);
        const ampel=lmraGesamtAmpel(l);

      </div>`;

  /* Archiv */
  const archivRows=(S.lmra||[]).slice(0,30).map(l=>{
    const bs=S.baustellen.find(b=>b.id===l.baustelleId);
    const datDE=new Date(l.datum+'T12:00').toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});

        ${LMRA_FRAGEN.map(f=>`<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;background:var(--c3);border:1px solid var(--border);border-radius:var(--r3);padding:3px 8px">

  ${canFill?`<button class="btn btn-primary btn-block" style="font-size:15px;padding:13px;margin-bottom:14px" onclick="openLMRAWizard()" aria-label="Neue LMRA für heute erstellen">

function lmraGesamtAmpel(l){
  const vals=[l.bewertung_mensch||'gruen',l.bewertung_arbeitsmittel||'gruen',l.bewertung_umgebung||'gruen'];
  if(vals.includes('rot')) return 'rot';
  if(vals.includes('gelb')) return 'gelb';
  return 'gruen';
}
function ampelEmoji(v){return {gruen:'🟢',gelb:'🟡',rot:'🔴'}[v]||'⚪'}
function ampelLabel(v){return {gruen:'Grün — Arbeiten möglich',gelb:'Gelb — Maßnahmen erforderlich',rot:'Rot — Arbeit stoppen'}[v]||'Unbekannt'}

function lmraNext(n){
  if(n===2){
    _lmraBid=document.getElementById('lmra-bs')?.value;
    if(!_lmraBid){toast('Bitte Baustelle wählen','te');return;}
  }
  if(n===3){
    const missing=LMRA_FRAGEN.filter(f=>!_lmraBewertung[f.id]);
    if(missing.length>0){toast('Bitte alle 3 Bereiche bewerten','te');return;}
    renderLMRASummary();
  }
  _lmraStep=n;
  [1,2,3].forEach(i=>{
    const s=document.getElementById('lmra-s'+i);
    if(s)s.style.display=i===n?'block':'none';
    const ps=document.getElementById('lps-'+i);
    if(ps)ps.style.background=i<n?'var(--green)':i===n?'var(--brand)':'var(--border)';
  });
}

function selectLMRA(fId,val){
  _lmraBewertung[fId]=val;
  ['gruen','gelb','rot'].forEach(v=>{
    const btn=document.getElementById(`lmra-${fId}-${v}`);
    if(!btn)return;
    const sel=v===val;
    const colors={gruen:'var(--green)',gelb:'var(--amber)',rot:'var(--red)'};
    btn.style.borderColor=sel?colors[v]:'var(--border)';
    btn.style.background=sel?colors[v].replace(')',', 0.15)').replace('var(','rgba('):'var(--c2)';
    btn.setAttribute('aria-pressed',String(sel));
  });
  /* Maßnahme-Feld zeigen wenn nicht grün */
  const mBox=document.getElementById('lmra-mass-'+fId);
  if(mBox)mBox.style.display=val!=='gruen'?'block':'none';
}

function renderLMRASummary(){
  const bs=S.baustellen.find(b=>b.id===_lmraBid);
  const datum=document.getElementById('lmra-datum')?.value||'';
  const datDE=datum?new Date(datum+'T12:00').toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'}):'';
  const gesamtAmpel=lmraGesamtAmpel({
    bewertung_mensch:_lmraBewertung.mensch,
    bewertung_arbeitsmittel:_lmraBewertung.arbeitsmittel,
    bewertung_umgebung:_lmraBewertung.umgebung
  });
  const wrap=document.getElementById('lmra-summary');
  if(!wrap)return;
  wrap.innerHTML=`<div class="card" style="margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">

      <span style="font-size:28px">${ampelEmoji(gesamtAmpel)}</span>
    </div>

function lmraCheckConfirm(){
  const cb=document.getElementById('lmra-cb');
  const btn=document.getElementById('lmra-save-btn');
  if(!cb||!btn)return;
  btn.style.opacity=cb.checked?'1':'.35';
  btn.style.pointerEvents=cb.checked?'auto':'none';
}

async function saveLMRA(){
  const datum=document.getElementById('lmra-datum')?.value||new Date().toISOString().split('T')[0];
  const bet=document.getElementById('lmra-bet')?.value||'';
  const row={
    datum, baustelle_id:_lmraBid,
    erstellt_von:CU.id, erstellt_von_name:CU.name,
    mensch_bewertung:_lmraBewertung.mensch,
    mensch_massnahme:document.getElementById('lmra-m-mensch')?.value||null,
    arbeitsmittel_bewertung:_lmraBewertung.arbeitsmittel,
    arbeitsmittel_massnahme:document.getElementById('lmra-m-arbeitsmittel')?.value||null,
    umgebung_bewertung:_lmraBewertung.umgebung,
    umgebung_massnahme:document.getElementById('lmra-m-umgebung')?.value||null,
    beteiligte:bet||null,
    abgeschlossen:true
  };
  showSpinner(true);
  const{error}=await SB.from('lmra').insert(row);
  showSpinner(false);
  if(error){toast('Fehler: '+error.message,'te');return;}
  if(!S.lmra) S.lmra=[];
  S.lmra.unshift({...row, id:'l-'+Date.now(), baustelleId:_lmraBid,
    bewertung_mensch:row.mensch_bewertung, bewertung_arbeitsmittel:row.arbeitsmittel_bewertung,
    bewertung_umgebung:row.umgebung_bewertung, erstelltVonName:CU.name});
  closeModal();
  renderLMRA();
  toast('✓ LMRA gespeichert','ts');
}

async function renderBSList(){
  const s=(document.getElementById('bs-s')?.value||'').toLowerCase();
  const st=document.getElementById('bs-st')?.value||'';
  let sites=getErlaubteBS().filter(b=>(!s||b.name.toLowerCase().includes(s)||b.kst.toLowerCase().includes(s))&&(!st||b.status===st));
  const el=document.getElementById('bs-list');
  if(!el)return;
  if(sites.length===0){el.innerHTML=emptyHTML('🏗','Keine Baustellen gefunden.');return;}
  el.innerHTML=sites.map(b=>{
    const as=S.arbeitsschutz[b.id];
    const asConf=as&&as.confirmations&&as.confirmations.length>0;
    const asNeeded=as&&(as.unterweisung.aktiv||as.gefaehrdung.aktiv);
    const asOk=asConf||!asNeeded;
    const h=S.eintraege.filter(e=>e.baustelleId===b.id).reduce((a,e)=>a+e.stunden,0);
    const asClass=asOk?'asi-ok':asConf?'asi-partial':'asi-warn';
    const asText=asOk?'✓ AS bestätigt':'⚠ AS ausstehend';
    return `<div class="site-card ${!asOk?'locked':''}" onclick="openSiteDetail('${b.id}')">
      <div class="site-card-hd">
        <div>
          <div class="site-name">${b.name}</div>
          <div class="site-meta">${b.adresse||'—'} · BL: ${b.bauleiter||'—'}</div>

        <span class="as-indicator ${asClass}">${asText}</span>
      </div>
    </div>`;
  }).join('');
}

function openBSForm(id=null){

  openModal(id?t('bs_modal_edit'):t('bs_modal_new'),`
    <div class="fg"><label class="req">Projektname</label><input class="fc" id="bsf-n" value="${b?.name||''}"></div>

async function saveBSForm(id){
  const n=document.getElementById('bsf-n').value.trim();
  const k=document.getElementById('bsf-k').value.trim();
  if(!n||!k){toast(t('bs_err_name'),'te');return;}
  const row={name:n,kst:k,bauleiter:document.getElementById('bsf-bl').value,adresse:document.getElementById('bsf-a').value,status:document.getElementById('bsf-st').value};
  showSpinner(true);
  var err2;
  if(id){
    ({error:err2}=await SB.from('baustellen').update(row).eq('id',id));
  } else {
    const{data:nb,error:e2}=await SB.from('baustellen').insert(row).select().single();
    err2=e2;
    if(!err2&&nb)await SB.from('arbeitsschutz').insert({baustelle_id:nb.id,unterweisung_text:'',unterweisung_aktiv:false,gefaehrdung_text:'',gefaehrdung_aktiv:false});
  }
  showSpinner(false);
  if(err2){toast('Fehler: '+err2.message,'te');return;}
  await loadAll();closeModal();renderBaustellen();toast(t('bs_saved'),'ts');
}

async function renderArbeitsschutz(){
  const el=document.getElementById('p-arbeitsschutz');
  const isAdmin=CAN.manageBS(CU.rolle);
  const canConf=CAN.confirmAS(CU.rolle);
  
  const bsItems=S.baustellen.filter(b=>b.status==='aktiv').map(b=>{
    const as=S.arbeitsschutz[b.id]||{unterweisung:{text:'',aktiv:false},gefaehrdung:{text:'',aktiv:false},confirmations:[]};
    const gb=as.gb_gefahren||null;
    const uOk=!as.unterweisung.aktiv||(as.confirmations&&as.confirmations.length>0);
    const gOk=!as.gefaehrdung.aktiv||(as.confirmations&&as.confirmations.length>0);
    const allOk=uOk&&gOk;
    const hasAny=as.unterweisung.aktiv||as.gefaehrdung.aktiv||gb;
    
    let statusClass='';let statusText='';
    if(!hasAny){statusClass='b-af';statusText='Kein AS hinterlegt';}
    else if(allOk&&gb){statusClass='b-genehmigt';statusText='✓ Vollständig';}
    else if(allOk){statusClass='b-genehmigt';statusText='✓ Bestätigt';}
    else{statusClass='b-abgelehnt';statusText='⚠ Offen';}

    const gbSection = gb
      ? gbViewHTML(b.id, gb, isAdmin)
      : (isAdmin ? `<div style="margin-bottom:8px">
          <button class="btn btn-warning btn-block" style="font-size:14px;padding:12px;justify-content:center" onclick="openGBWizard('${b.id}')">
            ⚠ Gefährdungsbeurteilung erstellen (BG BAU)
          </button>
        </div>` : `<div style="font-size:12px;color:var(--amber);padding:8px 0">⚠ Noch keine Gefährdungsbeurteilung hinterlegt.</div>`);

      <div class="card-hd">
        <div>

          <div class="card-sub">${b.kst}</div>
        </div>

          <span class="badge ${statusClass}">${statusText}</span>

function gbViewHTML(bid, gbData, isAdmin){
  const gefahren = (gbData.gefahren||[]).map(id=>GB_GEFAHREN.find(g=>g.id===id)).filter(Boolean);
  if(!gefahren.length) return '';
  const datum = gbData.datum||'';
  const ersteller = gbData.ersteller||'';
  
  let html = `<div style="background:var(--green-s);border:1px solid rgba(126,200,50,.35);border-radius:var(--r3);padding:10px 13px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:8px">
    <div>
      <div style="font-size:13px;font-weight:700;color:var(--green)">✓ Gefährdungsbeurteilung vorhanden</div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">${gefahren.length} Gefährdungen · ${datum}${ersteller?' · '+ersteller:''}</div>
    </div>
    ${isAdmin?`<button class="btn btn-sm btn-ghost" onclick="openGBWizard('${bid}')">Bearbeiten</button>`:''}
  </div>
  <div class="gb-view-wrap">`;

  gefahren.forEach((g,i)=>{
    html+=`<div class="gb-view-card">
      <div class="gb-view-hd" onclick="toggleGBView('gbv-${bid}-${g.id}')">
        <div class="gb-view-left">
          <span style="font-size:20px">${g.icon}</span>
          <div>
            <div style="font-size:13px;font-weight:700;color:var(--text)">${g.name}</div>
            <div style="font-size:11px;color:var(--text2)">${g.sub}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="gb-risiko gb-risiko-${g.risiko}">${g.risiko.toUpperCase()}</span>
          <span class="gb-chev" id="gbchev-${bid}-${g.id}">▶</span>
        </div>
      </div>
      <div class="gb-view-body" id="gbv-${bid}-${g.id}" style="display:none">
        <ul class="gb-ba-massnahmen" style="padding-top:6px">
          ${g.massnahmen.map(m=>`<li><span class="gb-check">✓</span><span>${m}</span></li>`).join('')}
        </ul>
      </div>
    </div>`;
  });

  html+='</div>';
  return html;
}

function toggleGBView(id){
  const el=document.getElementById(id);
  if(!el)return;
  const open=el.style.display==='block';
  el.style.display=open?'none':'block';
  const parts=id.split('-');
  const chev=document.getElementById('gbchev-'+parts.slice(1).join('-'));
  if(chev){chev.classList.toggle('open',!open);}
}

/* ── GB Wizard ── */
function openGBWizard(bid){
  _gbWizardBid=bid;
  _gbWizardStep=1;
  const as=S.arbeitsschutz[bid]||{};
  const existing=as.gb_gefahren?.gefahren||[];
  _gbSelGefahren=new Set(existing);
  const b=S.baustellen.find(x=>x.id===bid);
  openModal('📋 Gefährdungsbeurteilung — '+b.name, gbWizardHTML());
  setTimeout(()=>renderGBStep(),50);
}

function gbWizardHTML(){
  return `
  <div id="gb-prog" style="display:flex;gap:4px;margin-bottom:18px">
    ${[1,2,3].map(i=>`<div class="gb-prog-step" id="gbps-${i}"></div>`).join('')}
  </div>
  <div id="gb-step-1" class="gb-step">
    <div class="gb-step-title">🚧 Gefährdungen auswählen</div>
    <div class="gb-step-sub">Alle zutreffenden Gefahren für diese Baustelle antippen</div>
    <div id="gb-sel-info" class="gb-sel-info">

      <button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" style="flex:1;justify-content:center;font-size:15px;padding:12px" onclick="gbNextStep(2)">Weiter → Betriebsanweisungen</button>
    </div>
  </div>
  <div id="gb-step-2" class="gb-step">
    <div class="gb-step-title">📄 Betriebsanweisungen</div>
    <div class="gb-step-sub">Automatisch aus den gewählten Gefährdungen generiert</div>
    <div id="gb-ba-list"></div>
    <div class="gb-nav">
      <button class="btn btn-ghost" onclick="gbNextStep(1)">← Zurück</button>
      <button class="btn btn-primary" style="flex:1;justify-content:center;font-size:15px;padding:12px" onclick="gbNextStep(3)">Weiter → Zusammenfassung</button>
    </div>
  </div>
  <div id="gb-step-3" class="gb-step">
    <div class="gb-step-title">✅ Prüfen & Speichern</div>
    <div class="gb-step-sub">Gefährdungsbeurteilung abschließen</div>
    <div id="gb-summary"></div>
    <label class="gb-confirm-check" onclick="gbCheckConfirm()">
      <input type="checkbox" id="gb-confirm-cb">
      <span>Ich bestätige, dass die Gefährdungsbeurteilung vollständig und korrekt ist und alle relevanten Gefährdungen für diese Baustelle erfasst wurden. (BG BAU AMS)</span>
    </label>
    <div class="gb-nav">
      <button class="btn btn-ghost" onclick="gbNextStep(2)">← Zurück</button>
      <button class="btn btn-success" id="gb-save-btn" style="flex:1;justify-content:center;font-size:15px;padding:12px;opacity:.35;pointer-events:none" onclick="saveGB()">✓ GB speichern & aktivieren</button>
    </div>
  </div>`;
}

function renderGBStep(){
  [1,2,3].forEach(i=>{
    const el=document.getElementById('gb-step-'+i);
    if(el)el.style.display=i===_gbWizardStep?'block':'none';
    const ps=document.getElementById('gbps-'+i);
    if(ps){ps.className='gb-prog-step'+(i<_gbWizardStep?' done':i===_gbWizardStep?' active':'');}
  });
  if(_gbWizardStep===1) renderGBGefahren();
  if(_gbWizardStep===2) renderGBBetriebsanweisungen();
  if(_gbWizardStep===3) renderGBSummary();
}

function gbNextStep(n){
  if(n===2&&_gbSelGefahren.size===0){toast('Bitte mindestens eine Gefährdung auswählen','te');return;}
  _gbWizardStep=n;
  renderGBStep();
}

function renderGBGefahren(){
  const grid=document.getElementById('gb-gefahren-grid');
  if(!grid)return;
  grid.innerHTML='';
  GB_GEFAHREN.forEach(g=>{
    const sel=_gbSelGefahren.has(g.id);
    const d=document.createElement('div');
    d.className='gb-gefahr'+(sel?' sel':'');
    d.id='gbg-'+g.id;
    d.innerHTML=`<div class="gb-gefahr-top">
        <span class="gb-gefahr-icon">${g.icon}</span>
        <span class="gb-gefahr-check">✓</span>
      </div>
      <div class="gb-gefahr-name">${g.name}</div>
      <span class="gb-risiko gb-risiko-${g.risiko}">Risiko: ${g.risiko.toUpperCase()}</span>
      <div style="font-size:11px;color:var(--text2);margin-top:4px">${g.sub}</div>`;
    d.onclick=()=>gbToggleGefahr(g.id);
    grid.appendChild(d);
  });
  updateGBSelCount();
}

function gbToggleGefahr(id){
  if(_gbSelGefahren.has(id)) _gbSelGefahren.delete(id);
  else _gbSelGefahren.add(id);
  const card=document.getElementById('gbg-'+id);
  if(card) card.classList.toggle('sel',_gbSelGefahren.has(id));
  updateGBSelCount();
}

function updateGBSelCount(){
  const el=document.getElementById('gb-sel-count');
  if(el) el.textContent=_gbSelGefahren.size;
}

function renderGBBetriebsanweisungen(){
  const list=document.getElementById('gb-ba-list');
  if(!list)return;
  const sel=[..._gbSelGefahren].map(id=>GB_GEFAHREN.find(g=>g.id===id)).filter(Boolean);
  list.innerHTML=sel.map(g=>`
    <div class="gb-ba-card">
      <div class="gb-ba-top">
        <span class="gb-ba-icon">${g.icon}</span>
        <div class="gb-ba-label">
          <div class="gb-ba-name">${g.name}</div>
          <span class="gb-ba-type">Betriebsanweisung</span>
        </div>
      </div>
      <ul class="gb-ba-massnahmen">
        ${g.massnahmen.map(m=>`<li><span class="gb-check">✓</span><span>${m}</span></li>`).join('')}
      </ul>
    </div>`).join('');
}

function renderGBSummary(){
  const el=document.getElementById('gb-summary');
  if(!el)return;
  const sel=[..._gbSelGefahren].map(id=>GB_GEFAHREN.find(g=>g.id===id)).filter(Boolean);
  const b=S.baustellen.find(x=>x.id===_gbWizardBid);
  el.innerHTML=`
    <div class="card" style="margin-bottom:12px">
      <div class="gb-summary-row"><span class="gb-summary-label">Baustelle</span><strong>${b?.name||''}</strong></div>
      <div class="gb-summary-row"><span class="gb-summary-label">Datum</span><strong>${new Date().toLocaleDateString('de-DE')}</strong></div>
      <div class="gb-summary-row"><span class="gb-summary-label">Erstellt von</span><strong>${CU.name}</strong></div>
      <div class="gb-summary-row"><span class="gb-summary-label">Gefährdungen</span><strong>${sel.length}</strong></div>
      <div class="gb-summary-row"><span class="gb-summary-label">Betriebsanweisungen</span><strong>${sel.length} generiert</strong></div>
      <div class="gb-tags" style="margin-top:10px">${sel.map(g=>`<span class="gb-tag">${g.icon} ${g.name}</span>`).join('')}</div>
    </div>`;
  const cbState=document.getElementById('gb-confirm-cb');
  if(cbState) cbState.checked=false;
  gbCheckConfirm();
}

function gbCheckConfirm(){
  const cb=document.getElementById('gb-confirm-cb');
  const btn=document.getElementById('gb-save-btn');
  if(!cb||!btn)return;
  const ok=cb.checked;
  btn.style.opacity=ok?'1':'.35';
  btn.style.pointerEvents=ok?'auto':'none';
}

async function saveGB(){
  if(_gbSelGefahren.size===0){toast('Keine Gefährdungen ausgewählt','te');return;}
  const gbData={gefahren:[..._gbSelGefahren],datum:new Date().toLocaleDateString('de-DE'),ersteller:CU.name};
  const bid=_gbWizardBid;
  const as=S.arbeitsschutz[bid];
  showSpinner(true);
  let error;
  const row={baustelle_id:bid,gb_gefahren:gbData};
  if(as&&as.id){
    ({error}=await SB.from('arbeitsschutz').update(row).eq('baustelle_id',bid));
  } else {
    ({error}=await SB.from('arbeitsschutz').insert({...row,unterweisung_aktiv:false,unterweisung_text:'',gefaehrdung_aktiv:false,gefaehrdung_text:''}));
  }
  showSpinner(false);
  if(error){toast('Fehler: '+error.message,'te');return;}
  await loadAll();
  closeModal();
  renderArbeitsschutz();
  toast('Gefährdungsbeurteilung gespeichert ✓','ts');
}
