        <div class="as-read-indicator" id="ri-${docId}">⬇ Bitte vollständig durchlesen (nach unten scrollen)</div>
      </div>
    </div>`;
  }

  if(!as.unterweisung.aktiv&&!as.gefaehrdung.aktiv){
    html+='<div style="font-size:12px;color:var(--text3);padding:8px 0">Kein Arbeitsschutz für diese Baustelle hinterlegt.</div>';
  }

  /* ── Confirmation log ── */
  if(confirmed&&as.confirmations.length>0){
    html+=`<div class="as-confirm-log" style="margin-top:10px">
      <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Bestätigungsprotokoll</div>
      ${as.confirmations.map(c=>{
        const u=S.users.find(x=>x.id===c.vaId);
        return `<div class="as-log-row">
          <span>${u?.name||'?'} <span class="rb rb-vorarbeiter" style="font-size:9px">VA</span></span>
          <span style="color:var(--text2);font-family:var(--mono)">${c.date} ${c.time}</span>
          <span class="badge b-genehmigt">bestätigt</span>
        </div>`;
      }).join('')}
    </div>`;
  }

  /* ── Confirm button (only if not yet confirmed & has permission) ── */
  if(canConf&&(as.unterweisung.aktiv||as.gefaehrdung.aktiv)&&!confirmed){
    const uNeeded=as.unterweisung.aktiv;
    const gNeeded=as.gefaehrdung.aktiv;
    html+=`<div style="margin-top:12px">
      <div class="alert alert-w" style="margin-bottom:10px">
        <div><strong>Vorarbeiter-Bestätigung erforderlich</strong><br>
        Bitte alle Dokumente vollständig lesen. Erst dann wird der Button aktiviert.<br>
        Mit der Bestätigung wird dokumentiert, dass alle Mitarbeiter unterwiesen wurden.</div>
      </div>
      <button class="btn btn-success as-confirm-btn-big" id="as-confirm-btn-${bid}" onclick="openUnterschriftModal('${bid}')" disabled>
        🔒 Bitte erst alle Dokumente lesen
      </button>
    </div>`;
    /* Track read state */
    window._asReadState=window._asReadState||{};
    window._asReadState[bid]={uRead:!uNeeded,gRead:!gNeeded,bid};
  }

  if(confirmed&&canConf){
    html+=`<button class="btn btn-sm btn-ghost" style="margin-top:8px" onclick="resetAS('${bid}')">↺ Bestätigung zurücksetzen</button>`;
  }
  return html;
}

async function confirmAS(bid){
  if(!CAN.confirmAS(CU.rolle)){toast('Keine Berechtigung','te');return;}
  showSpinner(true);
  const{error}=await SB.from('as_confirmations').insert({baustelle_id:bid,user_id:CU.id,va_id:CU.id});

function toggleASDoc(docId){
  const body=document.getElementById('body-'+docId);
  const chev=document.getElementById('chev-'+docId);
  if(!body)return;
  const open=body.classList.toggle('open');
  if(chev)chev.style.transform=open?'rotate(90deg)':'rotate(0deg)';
  /* After opening, check if content is short enough to not need scrolling */
  if(open){
    setTimeout(()=>{
      const scrollEl=document.getElementById('scroll-'+docId);
      if(scrollEl&&scrollEl.scrollHeight<=scrollEl.clientHeight+10){
        markDocRead(docId);
      }
    },100);
  }
}

function checkScroll(docId,bid){
  const scrollEl=document.getElementById('scroll-'+docId);
  if(!scrollEl)return;
  const atBottom=scrollEl.scrollTop+scrollEl.clientHeight>=scrollEl.scrollHeight-10;
  if(atBottom)markDocRead(docId,bid);
}

function markDocRead(docId,bid){
  const ri=document.getElementById('ri-'+docId);
  if(ri){ri.textContent='✓ Gelesen';ri.classList.add('done');}
  /* Update read state and maybe enable confirm button */
  if(!window._asReadState)return;
  const parts=docId.split('-');
  const type=parts[0]; /* 'u' or 'g' */
  const bidStr=parts[1];
  const state=window._asReadState[bidStr||bid];
  if(!state)return;
  if(type==='u')state.uRead=true;
  if(type==='g')state.gRead=true;
  if(state.uRead&&state.gRead){
    const btn=document.getElementById('as-confirm-btn-'+(bidStr||bid));
    if(btn){
      btn.disabled=false;
      btn.innerHTML='⛑ Arbeitsschutz jetzt bestätigen';
      btn.classList.remove('btn-ghost');
    }
  }
}

async function resetAS(bid){
  if(!CAN.manageBS(CU.rolle)&&!CAN.confirmAS(CU.rolle)){toast('Keine Berechtigung','te');return;}
  showSpinner(true);
  const{error}=await SB.from('as_confirmations').delete().eq('baustelle_id',bid);
  showSpinner(false);
  if(error){toast('Fehler: '+error.message,'te');return;}
  await loadAll();renderArbeitsschutz();toast(t('as_reset_toast'),'tw2');
}

const AS_VORLAGEN = {

   • Schutzhelm (EN 397) — immer auf der Baustelle zu tragen
   • Warnschutzkleidung Klasse 2 (EN ISO 20471) — orange/gelb
   • Sicherheitsschuhe S3 (EN ISO 20345) — mit Stahlkappe und Durchtrittschutz
   • Schutzhandschuhe — bei Handarbeiten
   • Gehörschutz — bei Lärmpegel über 85 dB(A)

2. VERHALTEN AUF DER BAUSTELLE
   • Sicherheitsabstand zu Baumaschinen: mindestens 3 Meter

   • Keine alkohol- oder drogenbeeinflusste Arbeit (§ 15 ArbSchG)
   • Mobiltelefon während Maschinenbetrieb verboten

3. ERSTE HILFE & NOTFALL
   • Ersthelfer und Verbandkasten: Anweisung des Vorarbeiters beachten

   • Unfälle sofort dem Vorarbeiter melden

5. MELDEPFLICHTEN
   • Sicherheitsmängel sofort dem Vorarbeiter melden

   Maßnahmen:

function openUnterschriftModal(bid){
  openModal('✍ Digitale Unterschrift — Arbeitsschutzbestätigung',`
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6">
      Ich bestätige hiermit, dass ich die Sicherheitsunterweisung und Gefährdungsbeurteilung 
      für diese Baustelle gelesen und vollständig verstanden habe.<br>
      <strong style="color:var(--text)">Datum: ${new Date().toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})}</strong>
      &nbsp;·&nbsp; <strong style="color:var(--text)">${CU.name}</strong>
    </div>
    <div style="border:2px solid var(--brand);border-radius:var(--r3);background:#fff;margin-bottom:12px;position:relative">
      <canvas id="sig-canvas" width="460" height="160" 
        style="display:block;width:100%;touch-action:none;cursor:crosshair;border-radius:var(--r3)"></canvas>
      <div id="sig-hint" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;color:#ccc;pointer-events:none;text-align:center">
        ✍ Hier unterschreiben<br><span style="font-size:10px">(Finger oder Maus)</span>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <button class="btn btn-sm btn-ghost" onclick="clearSignature()">✕ Löschen</button>
      <span style="font-size:11px;color:var(--text3);align-self:center">Bitte vollständige Unterschrift leisten</span>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" id="sig-confirm-btn" onclick="confirmASWithSignature('${bid}')">✓ Bestätigen & Unterschrift speichern</button>
      <button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
    </div>`);

  /* Canvas Setup */
  setTimeout(()=>{
    const canvas=document.getElementById('sig-canvas');
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    ctx.strokeStyle='#1a1a2e';
    ctx.lineWidth=2.5;
    ctx.lineCap='round';
    ctx.lineJoin='round';
    let drawing=false;
    let hasSig=false;

    function getPos(e){
      const r=canvas.getBoundingClientRect();
      const scaleX=canvas.width/r.width;
      const scaleY=canvas.height/r.height;
      if(e.touches){
        return{x:(e.touches[0].clientX-r.left)*scaleX,y:(e.touches[0].clientY-r.top)*scaleY};
      }
      return{x:(e.clientX-r.left)*scaleX,y:(e.clientY-r.top)*scaleY};
    }

    function startDraw(e){
      e.preventDefault();
      drawing=true;
      const p=getPos(e);
      ctx.beginPath();ctx.moveTo(p.x,p.y);
      if(!hasSig){hasSig=true;const h=document.getElementById('sig-hint');if(h)h.style.display='none';}
    }
    function draw(e){
      e.preventDefault();
      if(!drawing)return;
      const p=getPos(e);
      ctx.lineTo(p.x,p.y);ctx.stroke();
    }
    function endDraw(e){e.preventDefault();drawing=false;}

    canvas.addEventListener('mousedown',startDraw);
    canvas.addEventListener('mousemove',draw);
    canvas.addEventListener('mouseup',endDraw);
    canvas.addEventListener('touchstart',startDraw,{passive:false});
    canvas.addEventListener('touchmove',draw,{passive:false});
    canvas.addEventListener('touchend',endDraw,{passive:false});
  },100);
}

function clearSignature(){
  const canvas=document.getElementById('sig-canvas');
  if(!canvas)return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
  const h=document.getElementById('sig-hint');if(h)h.style.display='block';
}

async function confirmASWithSignature(bid){
  const canvas=document.getElementById('sig-canvas');
  if(!canvas){await confirmAS(bid);return;}
  /* Prüfen ob Unterschrift geleistet wurde */
  const ctx=canvas.getContext('2d');
  const data=ctx.getImageData(0,0,canvas.width,canvas.height).data;
  const hasDrawing=Array.from(data).some((v,i)=>i%4===3&&v>0);
  if(!hasDrawing){toast('Bitte erst unterschreiben!','te');return;}
  /* Unterschrift als Base64 speichern */
  const sigData=canvas.toDataURL('image/png');
  /* In as_confirmations mit Unterschrift speichern */
  showSpinner(true);
  const{error}=await SB.from('as_confirmations').insert({
    baustelle_id:bid,
    user_id:CU.id,
    va_id:CU.id,
    /* Unterschrift als Notiz — Supabase speichert den Zeitstempel automatisch */
  });
  showSpinner(false);
  if(error){toast('Fehler: '+error.message,'te');return;}
  /* Unterschrift lokal speichern (als Nachweis) */
  try{
    const key=`sig_${bid}_${CU.id}_${Date.now()}`;
    localStorage.setItem(key, JSON.stringify({
      sig:sigData, name:CU.name, persnr:CU.persnr,
      datum:new Date().toISOString(), baustelle:S.baustellen.find(b=>b.id===bid)?.name
    }));
  }catch(e){}
  await loadAll();
  closeModal();
  renderArbeitsschutz();
  toast('✓ Arbeitsschutz bestätigt und Unterschrift gespeichert','ts');
}

async function getChefEntries(){

  var q=SB.from('eintraege').select('*').order('datum',{ascending:false}).limit(2000);
  if(mon)q=q.gte('datum',mon+'-01').lte('datum',mon+'-31');
  if(ma)q=q.eq('user_id',ma);
  if(si)q=q.eq('baustelle_id',si);

  return (data||[]).map(e=>({

    art:e.art,lohnart:e.lohnart,stunden:parseFloat(e.stunden),
    bemerkung:e.bemerkung||'',beginn:e.beginn||'',ende:e.ende||'',pause:e.pause_min||0,

async function exportCSV(){
  const e=await getChefEntries();
  const hdr=['Mitarbeiter','Personalnummer','Datum','Baustelle','Kostenstelle','Stundenart','Lohnart','Stunden','Bemerkung','Status'];
  const rows=e.map(x=>{
    const u=S.users.find(y=>y.id===x.userId);const b=S.baustellen.find(y=>y.id===x.baustelleId);
    return [u?.name||'',u?.persnr||'',x.datum,b?.name||'',b?.kst||'',x.art,x.lohnart,x.stunden.toFixed(2).replace('.',','),x.bemerkung||'',x.genehmigt].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(';');
  });
  const csv='\uFEFF'+[hdr.join(';'),...rows].join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`stunden_${today()}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast(`${e.length} Zeilen exportiert`,'ts');
}

/* ── LODAS Excel Export ─────────────────────────────────────────────────── */
async function exportLODAS(){
  if(typeof XLSX==='undefined'){toast('SheetJS nicht geladen','te');return;}
  const entries=getChefEntries();
  if(!entries.length){toast('Keine Einträge für diesen Filter','tw2');return;}

  const mon=document.getElementById('ch-mon')?.value||today().slice(0,7);
  const monLabel=mon?(()=>{const d=new Date(mon+'-15');return d.toLocaleDateString('de-DE',{month:'long',year:'numeric'});})():'';
  const wb=XLSX.utils.book_new();

  /* ── Lohnart-Bezeichnungen ── */
  const LA_BEZ={1:'Lohnarbeit',3:'Krankheit',4:'Feiertag',11:'Urlaub',9:'Ausfallzeit'};

  /* ══════════════════════════════════════════════════════════
     BLATT 1 — LODAS-Import
  ══════════════════════════════════════════════════════════ */
  const importRows=[];

  /* Titelzeile */
  importRows.push(['StundenBau → DATEV LODAS Import','','','','','','','','','','','','','']);
  importRows.push([`Monat: ${monLabel}    Mandantennummer: ___________    Erstellt am: ${new Date().toLocaleDateString('de-DE')}`,'','','','','','','','','','','','','']);
  importRows.push([
    'Personalnummer','Name','Vorname','Datum','Kostenstelle','Baustelle',
    'Stundenart','Lohnart-Nr.','Lohnart-Bez.','Stunden',
    'Arbeitsbeginn','Arbeitsende','Pause (Min)','Bemerkung'
  ]);

  /* Datenzeilen — nach Personalnummer sortiert */
  const sorted=[...entries].sort((a,b)=>{
    const ua=S.users.find(u=>u.id===a.userId);
    const ub=S.users.find(u=>u.id===b.userId);
    return (ua?.persnr||'').localeCompare(ub?.persnr||'')||a.datum.localeCompare(b.datum);
  });

  sorted.forEach(e=>{
    const u=S.users.find(y=>y.id===e.userId)||{};
    const b=S.baustellen.find(y=>y.id===e.baustelleId)||{};
    const nameParts=(u.name||'').split(' ');
    const vorname=nameParts.slice(0,-1).join(' ');
    const nachname=nameParts.slice(-1)[0]||'';
    importRows.push([
      u.persnr||'',
      nachname,
      vorname,
      e.datum,
      b.kst||'',
      b.name||'',
      e.art,
      e.lohnart,
      LA_BEZ[e.lohnart]||'',
      parseFloat(e.stunden),
      e.beginn||'',
      e.ende||'',
      e.pause||0,
      e.bemerkung||''
    ]);
  });

  /* Summenzeile */
  const totalH=sorted.reduce((a,x)=>a+parseFloat(x.stunden),0);
  importRows.push(['SUMME','','','','','','','','',totalH,'','','','']);
  importRows.push(['']);
  importRows.push(['ℹ Lohnarten: 1=Lohnarbeit · 3=Krankheit · 4=Feiertag · 11=Urlaub · 9=Ausfallzeit','','','','','','','','','','','','','']);

  const ws1=XLSX.utils.aoa_to_sheet(importRows);

  /* Spaltenbreiten */
  ws1['!cols']=[
    {wch:14},{wch:18},{wch:14},{wch:12},{wch:13},{wch:28},
    {wch:11},{wch:11},{wch:16},{wch:9},
    {wch:12},{wch:12},{wch:11},{wch:22}
  ];

  /* Zeilenmerges für Titelzeilen */
  ws1['!merges']=[
    {s:{r:0,c:0},e:{r:0,c:13}},
    {s:{r:1,c:0},e:{r:1,c:13}},
    {s:{r:importRows.length-1,c:0},e:{r:importRows.length-1,c:13}},
  ];

  XLSX.utils.book_append_sheet(wb, ws1, 'LODAS-Import');

  /* ══════════════════════════════════════════════════════════
     BLATT 2 — Monatsübersicht je Mitarbeiter
  ══════════════════════════════════════════════════════════ */
  const ovRows=[];
  ovRows.push([`Monatsübersicht — ${monLabel}`,'','','','','','','','','']);
  ovRows.push([`Betrieb: ___________    Erstellt: ${new Date().toLocaleDateString('de-DE')}`,'','','','','','','','','']);
  ovRows.push(['Personalnr.','Name','LA (h)','Krankheit (h)','Urlaub (h)','Feiertag (h)','Ausfallzeit (h)','Gesamt (h)','LA-Nr.1','LA-Nr.3','LA-Nr.4','LA-Nr.11','LA-Nr.9']);

  /* Gruppieren nach Mitarbeiter */
  const byUser={};
  sorted.forEach(e=>{
    if(!byUser[e.userId])byUser[e.userId]={la:0,k:0,u:0,f:0,af:0};
    const h=parseFloat(e.stunden);
    if(e.art==='LA')byUser[e.userId].la+=h;
    if(e.art==='K') byUser[e.userId].k+=h;
    if(e.art==='U') byUser[e.userId].u+=h;
    if(e.art==='F') byUser[e.userId].f+=h;
    if(e.art==='AF')byUser[e.userId].af+=h;
  });

  Object.entries(byUser).forEach(([uid,hrs])=>{
    const u=S.users.find(x=>x.id===uid)||{};
    const ges=hrs.la+hrs.k+hrs.u+hrs.f+hrs.af;
    ovRows.push([
      u.persnr||'',u.name||'',
      hrs.la,hrs.k,hrs.u,hrs.f,hrs.af,ges,
      hrs.la,hrs.k,hrs.f,hrs.u,hrs.af
    ]);
  });

  /* Summenzeile */
  const totals={la:0,k:0,u:0,f:0,af:0};
  Object.values(byUser).forEach(h=>{totals.la+=h.la;totals.k+=h.k;totals.u+=h.u;totals.f+=h.f;totals.af+=h.af;});
  const tGes=totals.la+totals.k+totals.u+totals.f+totals.af;
  ovRows.push(['SUMME','',totals.la,totals.k,totals.u,totals.f,totals.af,tGes,totals.la,totals.k,totals.f,totals.u,totals.af]);

  const ws2=XLSX.utils.aoa_to_sheet(ovRows);
  ws2['!cols']=[{wch:13},{wch:22},{wch:10},{wch:13},{wch:10},{wch:11},{wch:14},{wch:10},{wch:9},{wch:9},{wch:9},{wch:10},{wch:9}];
  ws2['!merges']=[{s:{r:0,c:0},e:{r:0,c:12}},{s:{r:1,c:0},e:{r:1,c:12}}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Monatsübersicht');

  /* ══════════════════════════════════════════════════════════
     BLATT 3 — Anleitung
  ══════════════════════════════════════════════════════════ */
  const anlRows=[
    ['StundenBau → DATEV LODAS · Anleitung & Lohnartenschlüssel'],
    [''],
    ['SCHRITT 1 — Export aus StundenBau'],
    ['1.','In der App → Chefübersicht → Monat wählen'],
    ['2.','Auf "📊 LODAS Excel" klicken'],
    ['3.','Datei speichern (z.B. stunden_januar_2026.xlsx)'],
    ['4.','Blatt "LODAS-Import" enthält alle Buchungen maschinenlesbar'],
    [''],
    ['SCHRITT 2 — Prüfung vor LODAS-Import'],
    ['●','Personalnummern mit LODAS-Stamm abgleichen'],
    ['●','Lohnart-Nummern prüfen (siehe Tabelle unten)'],
    ['●','Stunden plausibilisieren (Summe je Mitarbeiter)'],
    ['●','Fehlende oder falsche Einträge korrigieren (App → Chefübersicht → Eintrag bearbeiten)'],
    [''],
    ['SCHRITT 3 — Import in DATEV LODAS'],
    ['1.','LODAS öffnen → Mandant wählen'],
    ['2.','Lohnabrechnung → Bewegungsdaten → Importieren'],
    ['3.','Format: Excel/CSV → diese Datei auswählen'],
    ['4.','Spaltenzuordnung prüfen → Importieren'],
    ['5.','Importprotokoll prüfen, Fehler korrigieren'],
    [''],
    ['LOHNARTENSCHLÜSSEL'],
    ['Kürzel','Lohnart-Nr.','Bezeichnung in LODAS'],
    ['LA','1','Lohnarbeit / Arbeitsstunden (§ 614 BGB)'],
    ['K','3','Krankheit (AU, Lohnfortzahlung § 3 EFZG)'],
    ['F','4','Feiertag (Feiertagsvergütung § 2 EFZG)'],
    ['U','11','Urlaub (§ 1 BUrlG, Urlaubsentgelt)'],
    ['AF','9','Ausfallzeit (individuell konfigurierbar)'],
    [''],
    ['FEIERTAGE NIEDERSACHSEN 2026 (automatisch hinterlegt in App)'],
    ['Datum','Name','Sollstunden'],
    ['01.01.2026','Neujahr','8,0 h'],
    ['02.04.2026','Gründonnerstag (ab 12 Uhr)','8,0 h'],
    ['03.04.2026','Karfreitag','8,0 h'],
    ['05.04.2026','Ostersonntag','7,0 h'],
    ['06.04.2026','Ostermontag','8,0 h'],
    ['01.05.2026','Tag der Arbeit','8,0 h'],
    ['14.05.2026','Christi Himmelfahrt','8,0 h'],
    ['24.05.2026','Pfingstsonntag','7,0 h'],
    ['25.05.2026','Pfingstmontag','8,0 h'],
    ['03.10.2026','Tag der Deutschen Einheit','8,0 h'],
    ['31.10.2026','Reformationstag (Sa, NI)','7,0 h'],
    ['25.12.2026','1. Weihnachtstag','8,0 h'],
    ['26.12.2026','2. Weihnachtstag (Sa)','7,0 h'],
    [''],
    ['HINWEISE'],
    ['●','Lohnarten sind in StundenBau GESPERRT — nur Admin/Büro kann ändern'],
    ['●','Personalnummern müssen exakt mit LODAS übereinstimmen'],
    ['●','Bei Rückfragen zu LODAS: DATEV-Support 0800 1001116 (kostenlos)'],
  ];
  const ws3=XLSX.utils.aoa_to_sheet(anlRows);
  ws3['!cols']=[{wch:8},{wch:16},{wch:60}];
  XLSX.utils.book_append_sheet(wb, ws3, 'Anleitung');

async function renderUrlaubList(){
  var allUE=await loadEintraege({});
  S.eintraege=allUE;
  let e=allUE.filter(x=>['U','K','F','AF'].includes(x.art));
  const mon=document.getElementById('uv-mon')?.value;
  const art=document.getElementById('uv-art')?.value;
  const ma=document.getElementById('uv-ma')?.value;
  const st=document.getElementById('uv-st')?.value;
  if(mon)e=e.filter(x=>x.datum.startsWith(mon));
  if(art)e=e.filter(x=>x.art===art);
  if(ma)e=e.filter(x=>x.userId===ma);
  if(st)e=e.filter(x=>x.genehmigt===st);
  
  const pend=S.eintraege.filter(x=>x.genehmigt==='offen'&&['U','K','F','AF'].includes(x.art));
  const pd=document.getElementById('uv-pending');
  if(pd){if(pend.length>0){pd.style.display='flex';pd.innerHTML=`⏳ ${pend.length} Abwesenheit(en) warten auf Genehmigung`;}else pd.style.display='none';}
  
  const th=e.reduce((a,b)=>a+b.stunden,0);
  const ud=e.filter(x=>x.art==='U').length;
  const kd=e.filter(x=>x.art==='K').length;
  const gen=e.filter(x=>x.genehmigt==='genehmigt').length;
  const stEl=document.getElementById('uv-stats');
  if(stEl)stEl.innerHTML=`
    <div class="sc"><div class="sc-val">${th.toFixed(1)}h</div><div class="sc-lbl">Gesamt Std.</div></div>
    <div class="sc"><div class="sc-val">${ud}</div><div class="sc-lbl">Urlaubstage</div></div>
    <div class="sc"><div class="sc-val">${kd}</div><div class="sc-lbl">Krankheitstage</div></div>
    <div class="sc"><div class="sc-val">${gen}</div><div class="sc-lbl">Genehmigt</div></div>`;
  
  const list=document.getElementById('uv-list');
  if(!list)return;
  if(e.length===0){list.innerHTML=emptyHTML('📅','Keine Abwesenheiten gefunden.');return;}
  list.innerHTML=e.map(x=>{
    const u=S.users.find(y=>y.id===x.userId);
    const dt=new Date(x.datum+'T12:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
    return `<div class="vacation-row">
      <div class="vr-ma">
        <div class="vr-name">${u?.name||'?'}</div>
        <div class="vr-period">${dt} · Persnr. ${u?.persnr||'?'}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
        <span class="badge b-${x.art.toLowerCase()}">${x.art}</span>
        <span style="font-family:var(--mono);font-size:11px;color:var(--text2)">${x.stunden}h</span>
      </div>
      <div class="vr-actions">
        <span class="badge b-${x.genehmigt}">${x.genehmigt}</span>
        ${x.genehmigt==='offen'?`
          <button class="btn btn-sm btn-success" style="padding:3px 7px" onclick="approveAbs(${x.id},'genehmigt')">✓</button>
          <button class="btn btn-sm btn-danger" style="padding:3px 7px" onclick="approveAbs(${x.id},'abgelehnt')">✗</button>`:''}
      </div>
    </div>`;
  }).join('');
}

async function approveAbs(id,status){
  showSpinner(true);
  const{error}=await SB.from('eintraege').update({genehmigt:status}).eq('id',id);
  showSpinner(false);
  if(error){toast('Fehler: '+error.message,'te');return;}
  S.eintraege=await loadEintraege({});
  renderUrlaubList();toast(status==='genehmigt'?t('approve_ok'):t('approve_rej'),status==='genehmigt'?'ts':'te');
}

function today(){return new Date().toISOString().split('T')[0];}

function monthOpts(){
  const opts=[];const now=new Date();
  for(let i=0;i<13;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const v=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    opts.push(`<option value="${v}">${d.toLocaleDateString('de-DE',{month:'long',year:'numeric'})}</option>`);
  }
  opts.push('<option value="">Alle Monate</option>');
  return opts.join('');
}

function fdOpenCamera(){document.getElementById('fd-camera').click();}
function fdHandleFile(inp){
  const file=inp.files[0];if(!file)return;
  if(file.size>5*1024*1024){toast('Foto zu groß (max 5MB)','te');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    FD_PHOTO_DATA=e.target.result;
    const prev=document.getElementById('fd-preview');
    const img=document.getElementById('fd-preview-img');
    if(prev&&img){img.src=FD_PHOTO_DATA;prev.style.display='block';}
  };
  reader.readAsDataURL(file);
}
function fdClearPhoto(){
  FD_PHOTO_DATA=null;
  const prev=document.getElementById('fd-preview');
  if(prev)prev.style.display='none';
  document.getElementById('fd-file').value='';
  document.getElementById('fd-camera').value='';
}

    erstellt_von:CU.id, erstellt_von_name:CU.name
  };
  showSpinner(true);

  FD_LIST=FD_LIST.filter(r=>r.id!=id);
  _renderFDList();
  toast(t('fd_deleted'));
}


function openModal(title,body){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modal-bg'))return;
  document.getElementById('modal-bg').classList.remove('open');
}

/* ═════════════════════════════════════ TOAST ═════════════════════════════════════ */
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast ${type} show`;
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);
}

/* ═════════════════════════════════════ DEMO LIST ═════════════════════════════════════ */
document.addEventListener('DOMContentLoaded',()=>{
  /* Enter-Taste */
  const lp=document.getElementById('li-pass');
  if(lp)lp.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  const lu=document.getElementById('li-user');
  if(lu)lu.addEventListener('keydown',e=>{if(e.key==='Enter')lp&&lp.focus();});
  /* Login-Labels mit Sprache befüllen */
  const ll=document.getElementById('lbl-login-user');if(ll)ll.textContent=t('username');
  const lpl=document.getElementById('lbl-login-pass');if(lpl)lpl.textContent=t('password');
  const lb=document.getElementById('btn-login');if(lb)lb.textContent=t('login_btn');
  /* Sprach-Buttons auf gespeicherte Sprache setzen */
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.classList.toggle('act', b.textContent.trim().startsWith(LANG==='de'?'🇩🇪':'🇷🇴') || b.textContent.trim()===LANG.toUpperCase());
  });
});

/* ═════════════════════════════════════ PWA ═════════════════════════════════════ */
if('serviceWorker' in navigator){
  const sw=`const C='kenan1';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['.']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
